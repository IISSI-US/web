<script>
document.addEventListener('DOMContentLoaded', function () {
  var path = location.pathname;
  var roots = ['/requisitos/', '/modelado-conceptual/', '/modelado-relacional/', '/sql/'];
  var active = roots.find(function(r) { return path.indexOf(r) === 0; }) || '/requisitos/';
  document.querySelectorAll('.header .aux-nav a').forEach(function(a){
    var href = a.getAttribute('href');
    if (href === active || (href !== '/' && path.indexOf(href) === 0)) {
      a.classList.add('is-active');
    }
  });
});
</script>
