{% if include.src contains 'http' %}
  {% assign sql_url = include.src %}
{% else %}
  {% assign sql_url = include.src | relative_url %}
{% endif %}
<div class="sql-embed{% if include.collapsed %} is-collapsed{% endif %}" data-src="{{ sql_url }}"{% if include.label %} data-label="{{ include.label }}"{% endif %}>
  <div class="sql-embed__header">
    <button type="button" class="sql-embed__toggle" aria-expanded="{% if include.collapsed %}false{% else %}true{% endif %}" aria-label="Plegar/Desplegar"></button>
    <span class="sql-embed__label">{{ include.label | default: include.src }}</span>
    <button type="button" class="sql-embed__copy" aria-label="Copiar">Copiar</button>
  </div>
  <div class="highlight">
    <pre><code class="language-sql"></code></pre>
  </div>
  <noscript>
    <p>JavaScript deshabilitado. Puedes abrir el archivo: <a href="{{ sql_url }}">{{ include.src }}</a></p>
  </noscript>
</div>

<script>
  (function(){
    if (window.__SQL_EMBED_LOADED) return;
    window.__SQL_EMBED_LOADED = true;
    var s = document.createElement('script');
    s.src = '{{ "/assets/js/sql-embed.js" | relative_url }}';
    s.defer = true;
    document.head.appendChild(s);
  })();
</script>
