<!-- MathJax for formulas -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      tags: 'ams',
      packages: { '[+]': ['textmacros'] },

      macros: {
        Proj: ["\\mathop{\\mathchoice{\\Huge\\Pi}{\\Large\\Pi}{\\large\\Pi}{\\normalsize\\Pi}}\\limits_{#1}", 1],
        Sel: ["\\mathop{\\mathchoice{\\Huge\\sigma}{\\Large\\sigma}{\\large\\sigma}{\\normalsize\\sigma}}\\limits_{#1}", 1],
        Ren: ["\\mathop{\\mathchoice{\\Huge\\rho}{\\Large\\rho}{\\large\\rho}{\\normalsize\\rho}}\\limits_{#1}", 1],
        Group: ["\\mathop{\\mathchoice{\\Huge\\Upsilon}{\\Large\\Upsilon}{\\large\\Upsilon}{\\normalsize\\Upsilon}}\\limits^{#1}_{#2}", 2],
        GroupUp: ["\\mathop{\\mathchoice{\\Huge\\Upsilon}{\\Large\\Upsilon}{\\large\\Upsilon}{\\normalsize\\Upsilon}}\\limits^{#1}", 1],
        GroupDown: ["\\mathop{\\mathchoice{\\Huge\\Upsilon}{\\Large\\Upsilon}{\\large\\Upsilon}{\\normalsize\\Upsilon}}\\limits_{#1}", 1],
        JoinR: ["\\mathbin{\\mathop{\\mathchoice{\\Large\\bowtie}{\\large\\bowtie}{\\normalsize\\bowtie}{\\small\\bowtie}}\\limits_{#1}}", 1],
        NatJoin: ["\\mathbin{\\mathchoice{\\Large\\bowtie}{\\large\\bowtie}{\\normalsize\\bowtie}{\\small\\bowtie}}", 0],
        Diff: ["\\mathbin{\\mathchoice{\\Huge\\setminus}{\\Large\\setminus}{\\large\\setminus}{\\normalsize\\setminus}}", 0],
        Union: ["\\mathbin{\\mathchoice{\\Huge\\cup}{\\Large\\cup}{\\large\\cup}{\\normalsize\\cup}}", 0],
        Inter: ["\\mathbin{\\mathchoice{\\Huge\\cap}{\\Large\\cap}{\\large\\cap}{\\normalsize\\cap}}", 0]
      }
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    },
    svg: {
      fontCache: 'global',
      font: undefined
    },
    loader: { load: ['[tex]/textmacros'] }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Theme toggle script -->
<script>
  (function () {
    var STORAGE_KEY = 'mm-theme-mode';
    var mq = window.matchMedia('(prefers-color-scheme: dark)');

    function apply(mode) {
      var autoDark = mq.matches;
      var effective = mode === 'auto' ? (autoDark ? 'dark' : 'light') : mode;
      document.documentElement.setAttribute('data-theme', effective);
      updateIcon(mode);
    }

    function readMode() {
      try { return localStorage.getItem(STORAGE_KEY) || 'auto'; } catch (e) { return 'auto'; }
    }

    function writeMode(mode) {
      try { localStorage.setItem(STORAGE_KEY, mode); } catch (e) { }
    }

    function cycle() {
      var curr = readMode();
      var effective = curr === 'auto' ? (mq.matches ? 'dark' : 'light') : curr;
      var next = (curr === 'auto') ? (effective === 'dark' ? 'light' : 'dark') : (curr === 'dark' ? 'light' : 'auto');
      writeMode(next);
      apply(next);
    }

    function sunSVG() { return '<svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zm10.48 14.32l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM12 4V1h-0v3h0zm0 19v-3h0v3h0zM4 12H1v0h3v0zm19 0h-3v0h3v0zM6.76 19.16l-1.42 1.42-1.79-1.8 1.41-1.41 1.8 1.79zM20.45 4.46l-1.41-1.41-1.8 1.79 1.41 1.41 1.8-1.79zM12 6a6 6 0 100 12 6 6 0 000-12z"></path></svg>'; }
    function moonSVG() { return '<svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"></path></svg>'; }

    function updateIcon(mode) {
      var btn = document.getElementById('mm-theme-toggle');
      if (!btn) return;
      var autoDark = mq.matches;
      var effective = mode === 'auto' ? (autoDark ? 'dark' : 'light') : mode;
      btn.setAttribute('data-mode', mode);
      btn.title = 'Tema: ' + (mode === 'auto' ? ('auto (' + effective + ')') : mode);
      btn.setAttribute('aria-label', btn.title);
      btn.innerHTML = (effective === 'dark') ? moonSVG() : sunSVG();
    }

    function ensureToggleButton() {
      if (document.getElementById('mm-theme-toggle')) return;

      var container = document.querySelector('.greedy-nav__links') ||
        document.querySelector('.greedy-nav') ||
        document.querySelector('.masthead__inner-wrap') ||
        document.querySelector('.masthead');

      if (!container) return;

      var btn = document.createElement('button');
      btn.id = 'mm-theme-toggle';
      btn.className = 'theme-toggle';
      btn.type = 'button';
      btn.addEventListener('click', cycle);
      container.appendChild(btn);
      updateIcon(readMode());
    }

    // Apply theme immediately to avoid flash
    apply(readMode());

    document.addEventListener('DOMContentLoaded', function () {
      ensureToggleButton();
    });

    mq.addEventListener('change', function () {
      if (readMode() === 'auto') apply('auto');
    });
  })();
</script>

<!-- 
  =============================================================================
  FEATURE ROW CUSTOMIZATION - Cards responsivas para profesores y colecciones
  =============================================================================
  Personalización del componente feature_row de Minimal Mistakes para mostrar
  tarjetas de profesores (página /profesores/) y colecciones de materiales 
  (páginas /iissi1/ e /iissi2/).
  
  CARACTERÍSTICAS:
  - Grid responsivo CSS con breakpoints en 48em, 64em y 80em
  - Layout adaptativo: 5 columnas (desktop XL) → 3 (desktop) → 2 (tablet) → 1 (móvil)
  - Auto-centrado para 1 o 3 cards usando :has() selector
  - Cards con fondo, sombra y efecto hover (elevación)
  - Imágenes circulares de 100px con borde del color primario
  - Botones redondeados (border-radius: 20px) con animación scale
  - Tipografía compacta: título 1rem, excerpt 0.85rem
  - Padding 1rem, gap 1rem entre cards
  
  USO:
  En front matter YAML definir array con: image_path, alt, title, excerpt, 
  url, btn_label, btn_class. Luego incluir: {% include feature_row id="nombre" %}
  
  NOTA: CSS cargado aquí (custom.html) en vez de main.scss para evitar errores
  de variables Sass no definidas. Se usan !important para override del theme.
-->
<style>
  /* Layout: Grid de 5 columnas en pantallas grandes */
  .page__content .feature__wrapper,
  .feature__wrapper {
    max-width: 100% !important;
    width: 100% !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    display: grid !important;
    grid-template-columns: repeat(5, 1fr) !important;
    gap: 1rem !important;
    justify-items: center !important;
  }
  
  /* Centrar cuando hay menos de 5 items */
  .feature__wrapper:has(.feature__item:nth-child(3):last-child) {
    grid-template-columns: repeat(3, 1fr) !important;
    justify-content: center !important;
    max-width: 900px !important;
    margin: 0 auto !important;
  }
  
  .feature__wrapper:has(.feature__item:nth-child(1):last-child) {
    grid-template-columns: 1fr !important;
    max-width: 300px !important;
    margin: 0 auto !important;
  }
  
  .feature__item {
    max-width: 100% !important;
    width: 100% !important;
    flex: none !important;
    float: none !important;
  }
  
  /* Card: Fondo, sombra y efecto hover */
  .feature__item .archive__item {
    background: var(--background-color);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    padding: 1rem;
    text-align: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    height: 100%;
  }
  
  .feature__item .archive__item:hover {
    transform: translateY(-4px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
  }
  
  /* Foto: Circular 100px con borde del color primario */
  .feature__item .archive__item-teaser {
    margin-bottom: 0.75rem;
  }
  
  .feature__item .archive__item-teaser img {
    width: 100px !important;
    height: 100px !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    margin: 0 auto !important;
    display: block !important;
    border: 3px solid var(--primary-color);
  }
  
  /* Título: Centrado, 1rem */
  .feature__item .archive__item-title {
    text-align: center !important;
    margin-bottom: 0.5rem !important;
    font-size: 1rem !important;
  }
  
  /* Contenido: Centrado, compacto */
  .feature__item .archive__item-excerpt {
    text-align: center !important;
    font-size: 0.85rem !important;
    margin-bottom: 0.75rem !important;
    line-height: 1.4 !important;
  }
  
  /* Botón: Redondeado con animación de escala en hover */
  .feature__item .btn {
    background: var(--primary-color) !important;
    color: white !important;
    border: none !important;
    border-radius: 20px !important;
    padding: 0.5rem 1.5rem !important;
    font-size: 0.9rem !important;
    font-weight: 500 !important;
    transition: all 0.2s ease !important;
    text-decoration: none !important;
    display: inline-block !important;
  }
  
  .feature__item .btn:hover {
    background: var(--link-color-hover) !important;
    transform: scale(1.05);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }
  
  /* Responsive: 1 columna (móvil) → 2 (tablet) → 3 (desktop medio) → 5 (desktop grande) */
  @media (max-width: 48em) {
    .page__content .feature__wrapper,
    .feature__wrapper {
      grid-template-columns: 1fr !important;
    }
  }
  
  @media (min-width: 48em) and (max-width: 64em) {
    .page__content .feature__wrapper,
    .feature__wrapper {
      grid-template-columns: repeat(2, 1fr) !important;
    }
  }
  
  @media (min-width: 64em) and (max-width: 80em) {
    .page__content .feature__wrapper,
    .feature__wrapper {
      grid-template-columns: repeat(3, 1fr) !important;
    }
  }
</style>
