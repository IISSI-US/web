name: Deploy Jekyll site to Pages

on:
  # Ejecutar en push a la rama principal
  push:
    branches: ["main"]

  # Permite ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos necesarios para desplegar a GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone DB-Silence-IISSI-1 submodule
        run: |
          git clone https://github.eii.us.es/druiz/DB-Silence-IISSI-1.git assets/DB-Silence-IISSI-1
          ls -la assets/DB-Silence-IISSI-1/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true # Cachea las gemas automáticamente

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Ensure SQL files are in _site
        run: |
          echo "Copying DB-Silence-IISSI-1 to _site/assets/"
          mkdir -p _site/assets/DB-Silence-IISSI-1
          cp -r assets/DB-Silence-IISSI-1/* _site/assets/DB-Silence-IISSI-1/
          echo "Verifying files were copied:"
          ls -la _site/assets/DB-Silence-IISSI-1/Usuarios/sql/ || echo "ERROR: Usuarios/sql not found"
          test -f _site/assets/DB-Silence-IISSI-1/Usuarios/sql/createDB.sql && echo "SUCCESS: createDB.sql exists" || echo "ERROR: createDB.sql not found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
