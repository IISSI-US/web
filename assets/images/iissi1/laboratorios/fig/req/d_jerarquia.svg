gual a 70 a&#241;os.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.7607" x="350" y="129.395">- RN14: El dni est&#225; formado por 8 n&#250;meros y</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="62.7275" x="358.2646" y="144.5278">una letra.</text></g><!--reverse link Persona to Alumno--><g id="link_Persona_Alumno"><path codeLine="12" d="M208.75,178.6669 C208.75,199.3069 208.75,203.4769 208.75,220.0169 " fill="none" id="Persona-backto-Alumno" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="none" points="208.75,160.6669,202.75,178.6669,214.75,178.6669,208.75,160.6669" style="stroke:#181818;stroke-width:1.0;"/></g><!--reverse link Persona to Profesor--><g id="link_Persona_Profesor"><path codeLine="13" d="M289,178.6669 C289,199.3069 289,203.4769 289,220.0169 " fill="none" id="Persona-backto-Profesor" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="none" points="289,160.6669,283,178.6669,295,178.6669,289,160.6669" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.9751" x="148" y="186.4038">{Completa, Disjunta}</text></g><!--SRC=[NP2zJWCn48HxFyNGdhWeGOYV4mq26eHG5D6ZpTqcCTZUm_OL4V0mF005BMrUZBty8IWiMRCpizels-mOrvRcaJoXOTIE4YUKkEL8yQLRVQxbbcEIGCaiR6-oiNQy-RDlynAU_LGjngHd6rhIDZWRE2zRXiIy46CERAXTfudnfcjWE-z-rKlN-I3_n76K6IU96zbiaxXuAyjjuA-syrTulHBVEivqgEUbfovaUZScI6PGmkJ-SNkV9GCKnOHJZhQkhGHELL6eMAfhU5xXGHf9SFf8BTCkwqytGgREpYbBj986M__egC8TWHjgUchASayEIjNJKY84wWRil2C7mkW4jFhIqfvYMCztezFXPhIlFwvmuz04gsrvzO6PH4-DeDNO6SBgstDSDwqtT8f54KGQ60uD-kFD3m00]--></g></svg>