spacing" textLength="116.5117" x="447" y="289.8857">acr&#243;nimo: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.7188" x="447" y="306.1826">cr&#233;ditos: Integer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.7129" x="447" y="322.4795">curso: Integer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="141.6885" x="447" y="338.7764">tipo: TipoAsignatura</text></g><!--class Grupo--><g id="elem_Grupo"><rect codeLine="0" fill="#F1F1F1" height="83.1875" id="Grupo" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="180.4238" x="655" y="294.7969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="42.9297" x="723.7471" y="312.792">Grupo</text><line style="stroke:#181818;stroke-width:0.5;" x1="656" x2="834.4238" y1="321.0938" y2="321.0938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="105.2803" x="661" y="338.0889">nombre: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.4238" x="661" y="354.3857">actividad: TipoActividad</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.6885" x="661" y="370.6826">a&#241;oAcad&#233;mico: Integer</text></g><!--class Profesor--><g id="elem_Profesor"><rect codeLine="0" fill="#F1F1F1" height="50.5938" id="Profesor" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="213.2773" x="87" y="357.7969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="57.9209" x="164.6782" y="375.792">Profesor</text><line style="stroke:#181818;stroke-width:0.5;" x1="88" x2="299.2773" y1="384.0938" y2="384.0938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.2773" x="93" y="401.0889">categor&#237;a: Categor&#237;aProfesor</text></g><!--class Carga--><g id="elem_Carga"><rect codeLine="0" fill="#F1F1F1" height="50.5938" id="Carga" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="126.9668" x="454.5" y="420.7969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="41.5762" x="497.1953" y="438.792">Carga</text><line style="stroke:#181818;stroke-width:0.5;" x1="455.5" x2="580.4668" y1="447.0938" y2="447.0938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.9668" x="460.5" y="464.0889">cr&#233;ditos: Double</text></g><ellipse cx="518" cy="383.2969" fill="#181818" rx="2" ry="2" style="stroke:#181818;stroke-width:1.0;"/><g id="elem_RN_Academico"><path d="M6,43.2969 L6,219.7578 L380.9897,219.7578 L380.9897,53.2969 L370.9897,43.2969 L6,43.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M370.9897,43.2969 L370.9897,53.2969 L380.9897,53.2969 L370.9897,43.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="103.4541" x="12" y="60.3638">Restricciones:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.9897" x="12" y="75.4966">- RN03: Un grupo no puede tener m&#225;s de 2 profesores</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.9575" x="12" y="90.6294">- RN06: De cada asignatura, no puede haber</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.6953" x="20.2646" y="105.7622">m&#225;s de un grupo de teor&#237;a y dos de laboratorio.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.5728" x="12" y="120.895">- RN10: Los cr&#233;ditos de una asignatura pueden</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="69.4116" x="20.2646" y="136.0278">ser 6 o 12.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.3428" x="12" y="151.1606">- RN13: Los a&#241;os de un grado est&#225;n entre 3 y 6.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="243.8071" x="12" y="166.2935">- RN15: El a&#241;o acad&#233;mico es un valor</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.8682" x="20.2646" y="181.4263">comprendido entre 2000 y 2100.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.5654" x="12" y="196.5591">- RN16: El curso de una asignatura est&#225;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.2422" x="20.2646" y="211.6919">comprendido entre 1 y 6.</text></g><!--link Grado to Asignatura--><g id="link_Grado_Asignatura"><path codeLine="41" d="M252.26,288.2969 C305.05,288.2969 382.91,288.2969 440.72,288.2969 " fill="none" id="Grado-Asignatura" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#000000" points="252.49,279.8633,261.5351,282.8022,261.5351,276.9244,252.49,279.8633" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.2188" x="266.49" y="284.3638">impartidaEn</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="260.3005" y="301.3402">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="426.483" y="301.1553">*</text></g><!--reverse link Asignatura to Grupo--><g id="link_Asignatura_Grupo"><path codeLine="42" d="M607.17,320.5469 C626.32,320.5469 635.01,320.5469 654.73,320.5469 " fill="none" id="Asignatura-backto-Grupo" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="595.17,320.5469,601.17,324.5469,607.17,320.5469,601.17,316.5469,595.17,320.5469" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="623.9234" y="331.98">1..*</text></g><!--link Profesor to apoint10--><g id="link_Profesor_apoint10"><path d="M300.2,383.2969 C387.39,383.2969 498.92,383.2969 515.82,383.2969 " fill="none" id="Profesor-apoint10" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#000000" points="418.01,391.8633,408.9649,388.9244,408.9649,394.8022,418.01,391.8633" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="111.0078" x="422.01" y="396.3638">imparteDocencia</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="308.2643" y="395.9343">*</text></g><!--link apoint10 to Grupo--><g id="link_apoint10_Grupo"><path d="M518,380.8769 C518,376.5169 518,367.7969 518,367.7969 C518,367.7969 591.58,367.7969 654.96,367.7969 " fill="none" id="apoint10-Grupo" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="640.3864" y="383.4566">*</text></g><!--link apoint10 to Carga--><g id="link_apoint10_Carga"><path d="M518,385.3969 C518,390.9469 518,406.5669 518,420.5969 " fill="none" id="apoint10-Carga" style="stroke:#181818;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.1206" x="426" y="416.0638">cargaDocente</text></g><!--SRC=[TLBDYjim4BxhAQOvjMPZx8JcO4fXQS9UIYaBFHUjFEk8sXepaWjvd3tkeOS-Wr-i8zbnGjYUR6Q-F-bJiA55s5lTiEuqr0YcrHuzhE7W0myc3An16rsFhvqr6axGCpsZ9qQlZZOIB9iMft_i-d223hidPA-K_sLThqKPMkimd7e4ud0arU9pW430jZa6g2sZ2PQSKk-iC-qWIW-iQyhjqBMNs