<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="810px" preserveAspectRatio="none" style="width:739px;height:810px;background:#FFFFFF;" version="1.1" viewBox="0 0 739 810" width="739px" zoomAndPan="magnify"><title>Diagrama de clases - Alumnos, matr&#237;culas y evaluaci&#243;n</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="435.2168" x="145.0347" y="22.9951">Diagrama de clases - Alumnos, matr&#237;culas y evaluaci&#243;n</text><!--class Alumno--><g id="elem_Alumno"><rect codeLine="0" fill="#F1F1F1" height="50.5938" id="Alumno" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="226.0127" x="101" y="166.7969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="53.416" x="187.2983" y="184.792">Alumno</text><line style="stroke:#181818;stroke-width:0.5;" x1="102" x2="326.0127" y1="193.0938" y2="193.0938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.0127" x="107" y="210.0889">m&#233;todoAcceso: M&#233;todoAcceso</text></g><!--class Asignatura--><g id="elem_Asignatura"><rect codeLine="0" fill="#F1F1F1" height="115.7813" id="Asignatura" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="153.6885" x="7" y="401.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.7969" x="45.9458" y="419.292">Asignatura</text><line style="stroke:#181818;stroke-width:0.5;" x1="8" x2="159.6885" y1="427.5938" y2="427.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="105.2803" x="13" y="444.5889">nombre: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.5117" x="13" y="460.8857">acr&#243;nimo: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.7188" x="13" y="477.1826">cr&#233;ditos: Integer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="97.7129" x="13" y="493.4795">curso: Integer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="141.6885" x="13" y="509.7764">tipo: TipoAsignatura</text></g><!--class Grupo--><g id="elem_Grupo"><rect codeLine="0" fill="#F1F1F1" height="83.1875" id="Grupo" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="180.4238" x="52" y="577.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="42.9297" x="120.7471" y="595.292">Grupo</text><line style="stroke:#181818;stroke-width:0.5;" x1="53" x2="231.4238" y1="603.5938" y2="603.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="105.2803" x="58" y="620.5889">nombre: String</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.4238" x="58" y="636.8857">actividad: TipoActividad</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.6885" x="58" y="653.1826">a&#241;oAcad&#233;mico: Integer</text></g><!--class Nota--><g id="elem_Nota"><rect codeLine="0" fill="#F1F1F1" height="83.1875" id="Nota" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="204.3291" x="111" y="720.2969"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="33.1064" x="196.6113" y="738.292">Nota</text><line style="stroke:#181818;stroke-width:0.5;" x1="112" x2="314.3291" y1="746.5938" y2="746.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.8506" x="117" y="763.5889">valor: Double</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="192.3291" x="117" y="779.8857">convocatoria: Convocatoria</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.3711" x="117" y="796.1826">esMH: Boolean</text></g><g id="elem_RN_Alumnos"><path d="M362,43.2969 L362,340.8203 L732.2861,340.8203 L732.2861,53.2969 L722.2861,43.2969 L362,43.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M722.2861,43.2969 L722.2861,53.2969 L732.2861,53.2969 L722.2861,43.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="103.4541" x="368" y="60.3638">Restricciones:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.6963" x="368" y="75.4966">- RN01: Un alumno no puede tener m&#225;s de una</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.3667" x="376.2646" y="90.6294">nota para la misma asignatura, convocatoria</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.9561" x="376.2646" y="105.7622">y a&#241;o acad&#233;mico.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.3633" x="368" y="120.895">- RN02: Un alumno no puede tener notas</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.0376" x="376.2646" y="136.0278">en grupos a los que no pertenece.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.958" x="368" y="151.1606">- RN04: Un alumno no puede pertenecer a m&#225;s de</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.1475" x="376.2646" y="166.2935">un grupo de teor&#237;a y a m&#225;s de un grupo de</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.4907" x="376.2646" y="181.4263">laboratorio de cada asignatura</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.0781" x="368" y="196.5591">- RN05: Una nota no puede alterarse en m&#225;s</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253.4429" x="376.2646" y="211.6919">de 4 puntos (aumentada o disminuida)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="335.0864" x="368" y="226.8247">- RN07: Un alumno s&#243;lo puede pertenecer a grupos</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.6548" x="376.2646" y="241.9575">de las asignaturas en las que est&#225; matriculado.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.061" x="368" y="257.0903">- RN08: Un alumno no puede acceder por</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.5474" x="376.2646" y="272.2231">selectividad teniendo menos de 16 a&#241;os.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.1538" x="368" y="287.356">- RN01 (parte 2): Para obtener MH el valor de la nota</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190.9312" x="376.2646" y="302.4888">debe ser superior o igual a 9.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.4111" x="368" y="317.6216">- RN11: El valor de la nota est&#225; comprendido</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.7129" x="376.2646" y="332.7544">entre 0 y 10.</text></g><!--reverse link Asignatura to Grupo--><g id="link_Asignatura_Grupo"><path codeLine="76" d="M106.5,529.3269 C106.5,549.1069 106.5,558.8069 106.5,577.0469 " fill="none" id="Asignatura-backto-Grupo" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="106.5,517.3269,102.5,523.3269,106.5,529.3269,110.5,523.3269,106.5,517.3269" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.0356" x="75.9784" y="566.2602">1..*</text></g><!--link Alumno to Asignatura--><g id="link_Alumno_Asignatura"><path codeLine="77" d="M131,217.8969 C131,259.7969 131,344.0469 131,401.0669 " fill="none" id="Alumno-Asignatura" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74.9722" x="56" y="305.5538">seMatricula</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="106.2408" y="237.2634">*</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="130.412" y="390.1443">*</text></g><!--link Alumno to Grupo--><g id="link_Alumno_Grupo"><path codeLine="78" d="M196.5,218.0169 C196.5,289.2469 196.5,489.5769 196.5,577.0569 " fill="none" id="Alumno-Grupo" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74.9658" x="197.5" y="393.6038">perteneceA</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="186.0689" y="237.4096">*</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="198.7139" y="566.2718">*</text></g><!--link Alumno to Nota--><g id="link_Alumno_Nota"><path codeLine="79" d="M273.5,217.8769 C273.5,307.5869 273.5,608.5269 273.5,719.8969 " fill="none" id="Alumno-Nota" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="49.1499" x="223.5" y="464.9538">obtiene</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="278.3642" y="237.6558">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="276.6777" y="709.0863">*</text></g><!--link Grupo to Nota--><g id="link_Grupo_Nota"><path codeLine="80" d="M171.5,660.5469 C171.5,679.3369 171.5,701.4769 171.5,720.2469 " fill="none" id="Grupo-Nota" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#000000" points="176.5,676.9633,173.5611,686.0084,179.4389,686.0084,176.5,676.9633" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="73.8232" x="185.5" y="686.4638">obtenidaEn</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="167.5519" y="680.4586">1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="6.5" x="158.1438" y="709.1853">*</text></g><!--SRC=[VLHDQzj04BthLqnzQM9Y4uNqo_GIQ6Wl2IMGSnclfixIrQww7m7_d1nxwA7a9-YFzUtAaarg2a8oEs_UcpSpwwYZ4VgaUUEvPMg4bE4WWHPqPL9hNJYZbgFlVwk406r97jaaLhf_jjM3pWdQAoF3RscxkALMshNuK5NXXxOTWvcCjXAtdP3pyS5LhuryZnGTURrvYDHeBofgPwlgbRRA950DyakTMdDm6FJ6SaoUNmG- -zIz1D-wk8DL-poQBnOqgvVB-Mn8ecfGeXbESWoV0_YAWjoW0JhxFm8TE5RKYOzYHSdL1AedKAu46BUE6fXgoFat_Z4ZnEg6hz49ww8GMdvt-sqtYefeFh-JaAjHw9Q4rNoEmmKmv_MAxYtne8sdIu8Uv9eyjVrJoBDDbW4dXA6N1qE6gTK1a-V9yXafPn-TukYyPYe9M-B-ZoDMtFI_MgtSSfIz-8zibWa3WLZQPDU1e8dtpoG5FNPjuhiyoZVXFF97DuKuxOYfg3eiAkTg3opluoN1yDhvugsSmT6X-R6CDxaC7XerLS4cYcSV9Dif0eKHaKiWR8Il4qwjs9X9GO_EQfimpzEHzzsXlT0_cwCEXrQDvFdUxIiCMJmVvHPY5_gdSa7BVZRxkRm_saTM2XzFdVD3xK5CldcFgB79KyD-DWuN6DkMfUktPV1Xegtf17k3nRmuNT7Nl45bPK5vyuN44FuSG5sA7fgtCx4MI7aA2Jur48xq9h61rmyZTuqDlZx2C7XKhkqyYjCeRxTHqGkTOzZr-R929AEb-Wi0]--></g></svg>