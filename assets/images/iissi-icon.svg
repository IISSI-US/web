<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#4a9eff" opacity="0.95"/>
  
  <!-- Backend (izquierda): Base de datos -->
  <g transform="translate(40, 65)">
    <!-- Cilindro de base de datos -->
    <ellipse cx="25" cy="12" rx="24" ry="8" fill="#ffffff" opacity="0.9"/>
    <rect x="1" y="12" width="48" height="35" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="25" cy="47" rx="24" ry="8" fill="#ffffff" opacity="0.9"/>
    <!-- Líneas de separación -->
    <ellipse cx="25" cy="23" rx="24" ry="8" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <ellipse cx="25" cy="35" rx="24" ry="8" fill="none" stroke="#4a9eff" stroke-width="2"/>
  </g>
  
  <!-- Separador central -->
  <line x1="100" y1="55" x2="100" y2="145" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  
  <!-- Frontend (derecha): Browser con React -->
  <g transform="translate(105, 65)">
    <!-- Ventana del navegador -->
    <rect x="0" y="0" width="55" height="42" rx="4" fill="#ffffff" opacity="0.9" stroke="#4a9eff" stroke-width="2"/>
    <!-- Barra superior del navegador -->
    <rect x="0" y="0" width="55" height="8" rx="4" fill="#4a9eff" opacity="0.6"/>
    <circle cx="5" cy="4" r="1.5" fill="#ffffff"/>
    <circle cx="10" cy="4" r="1.5" fill="#ffffff"/>
    <circle cx="15" cy="4" r="1.5" fill="#ffffff"/>
    
    <!-- Logo React simplificado -->
    <g transform="translate(27.5, 25)">
      <!-- Átomo central -->
      <circle cx="0" cy="0" r="3" fill="#61dafb"/>
      <!-- Órbitas elípticas -->
      <ellipse cx="0" cy="0" rx="16" ry="6.5" fill="none" stroke="#61dafb" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="16" ry="6.5" fill="none" stroke="#61dafb" stroke-width="1.5" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="16" ry="6.5" fill="none" stroke="#61dafb" stroke-width="1.5" transform="rotate(-60)"/>
    </g>
  </g>
  
  <!-- Texto IISSI -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">IISSI</text>
</svg>
