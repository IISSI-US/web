<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#06b6d4" opacity="0.1"/>
  
  <!-- Pantalla/navegador -->
  <g fill="none" stroke="#06b6d4" stroke-width="3">
    <!-- Ventana del navegador -->
    <rect x="40" y="50" width="120" height="90" rx="6"/>
    
    <!-- Barra superior -->
    <rect x="40" y="50" width="120" height="20" rx="6" fill="#06b6d4" opacity="0.2"/>
    
    <!-- Botones de ventana -->
    <circle cx="52" cy="60" r="3" fill="#06b6d4" opacity="0.6"/>
    <circle cx="63" cy="60" r="3" fill="#06b6d4" opacity="0.6"/>
    <circle cx="74" cy="60" r="3" fill="#06b6d4" opacity="0.6"/>
  </g>
  
  <!-- Logo React (átomo) -->
  <g fill="none" stroke="#06b6d4" stroke-width="2.5">
    <!-- Órbitas -->
    <ellipse cx="100" cy="100" rx="40" ry="15" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="100" rx="40" ry="15" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="100" rx="40" ry="15" transform="rotate(120 100 100)"/>
    
    <!-- Núcleo -->
    <circle cx="100" cy="100" r="5" fill="#06b6d4"/>
  </g>
  
  <!-- Código JSX -->
  <g fill="#06b6d4" opacity="0.5">
    <text x="55" y="125" font-family="monospace" font-size="11" font-weight="bold">&lt;App /&gt;</text>
  </g>
</svg>
