<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#ec4899" opacity="0.1"/>
  
  <!-- Marco del calendario -->
  <g fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rectángulo principal -->
    <rect x="50" y="60" width="100" height="90" rx="6"/>
    
    <!-- Encabezado -->
    <rect x="50" y="60" width="100" height="25" rx="6" fill="#ec4899" opacity="0.2"/>
    <line x1="50" y1="85" x2="150" y2="85"/>
    
    <!-- Anillas superiores -->
    <line x1="75" y1="50" x2="75" y2="65" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="50" x2="100" y2="65" stroke-width="4" stroke-linecap="round"/>
    <line x1="125" y1="50" x2="125" y2="65" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Cuadrícula del calendario -->
  <g stroke="#ec4899" stroke-width="1.5" opacity="0.3">
    <!-- Líneas verticales -->
    <line x1="70" y1="85" x2="70" y2="150"/>
    <line x1="90" y1="85" x2="90" y2="150"/>
    <line x1="110" y1="85" x2="110" y2="150"/>
    <line x1="130" y1="85" x2="130" y2="150"/>
    
    <!-- Líneas horizontales -->
    <line x1="50" y1="100" x2="150" y2="100"/>
    <line x1="50" y1="115" x2="150" y2="115"/>
    <line x1="50" y1="130" x2="150" y2="130"/>
  </g>
  
  <!-- Días marcados -->
  <g fill="#ec4899">
    <!-- Día destacado 1 -->
    <circle cx="80" cy="107" r="4" opacity="0.7"/>
    
    <!-- Día destacado 2 -->
    <circle cx="120" cy="107" r="4" opacity="0.7"/>
    
    <!-- Día importante (más grande) -->
    <circle cx="100" cy="122" r="5" opacity="0.9"/>
    
    <!-- Otros días -->
    <circle cx="60" cy="137" r="3" opacity="0.5"/>
    <circle cx="140" cy="137" r="3" opacity="0.5"/>
  </g>
  
  <!-- Icono de reloj (en una esquina) -->
  <g fill="none" stroke="#ec4899" stroke-width="2" opacity="0.6">
    <circle cx="135" cy="135" r="8"/>
    <line x1="135" y1="135" x2="135" y2="130" stroke-linecap="round"/>
    <line x1="135" y1="135" x2="138" y2="137" stroke-linecap="round"/>
  </g>
</svg>
