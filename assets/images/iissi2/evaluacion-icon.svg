<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#f59e0b" opacity="0.1"/>
  
  <!-- Portapapeles/Tablero de evaluación -->
  <g fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clip superior -->
    <rect x="85" y="35" width="30" height="12" rx="6" fill="#f59e0b" opacity="0.3"/>
    
    <!-- Tablero principal -->
    <rect x="60" y="45" width="80" height="110" rx="6"/>
  </g>
  
  <!-- Items de checklist -->
  <g stroke="#f59e0b" stroke-width="2.5">
    <!-- Item 1 - Completado -->
    <rect x="75" y="65" width="16" height="16" rx="3" fill="none"/>
    <path d="M 79 73 L 84 78 L 89 69" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="100" y1="73" x2="125" y2="73" opacity="0.5" stroke-width="2"/>
    
    <!-- Item 2 - Completado -->
    <rect x="75" y="90" width="16" height="16" rx="3" fill="none"/>
    <path d="M 79 98 L 84 103 L 89 94" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="100" y1="98" x2="120" y2="98" opacity="0.5" stroke-width="2"/>
    
    <!-- Item 3 - Pendiente -->
    <rect x="75" y="115" width="16" height="16" rx="3" fill="none"/>
    <line x1="100" y1="123" x2="125" y2="123" opacity="0.5" stroke-width="2"/>
    
    <!-- Item 4 - Pendiente -->
    <rect x="75" y="140" width="16" height="16" rx="3" fill="none"/>
    <line x1="100" y1="148" x2="115" y2="148" opacity="0.5" stroke-width="2"/>
  </g>
  
  <!-- Estrella de calificación -->
  <g fill="#f59e0b" opacity="0.6">
    <polygon points="120,130 123,138 132,138 125,143 127,151 120,146 113,151 115,143 108,138 117,138"/>
  </g>
  
  <!-- Porcentaje/Nota -->
  <g fill="#f59e0b" opacity="0.5">
    <text x="70" y="38" font-family="Arial, sans-serif" font-size="14" font-weight="bold">A+</text>
  </g>
</svg>
