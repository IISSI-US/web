<p>European Computer Manufacturers Association: organización que define estándares tecnológicos relacionados con los sistemas de información y comunicación</p>
<ul>
<li><a href="https://www.ecma-international.org/">https://www.ecma-international.org/</a></li>

<p>Otros ejemplos de estándar ECMA</p>
<ul>
<li>

</li>

</li>
<li>
<p>JSON</p>
</li>
<li>
<p>Lenguajes de programación: C#, Eiffel,</p>
</li>
<li>
<p>… (<a href="https://en.wikipedia.org/wiki/List_of_Ecma_standards">https://en.wikipedia.org/wiki/List_of_Ecma_standards</a>)</p>

<h1 id="caracter%C3%ADsticas">Características</h1>
<p>Lenguaje interpretado (no compilado)</p>
<p>Tipado dinámico</p>
<p>JavaScript es un lenguaje de programación como cualquier otro y puede utilizarse en diversos contextos.</p>
<p>Sin embargo, donde su uso está realmente extendido es en la web, donde se utiliza para dar dinamismo en las páginas web.</p>
<p>No sólo se utiliza en frontend, sino también en backend para programar software de servidores</p>
<ul>
<li><code>NodeJS</code>, <code>Express</code>, <code>MeteorJS</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="6" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ecmascript-vs-javascript">ECMAScript vs JavaScript</h1>
<p>JavaScript es un lenguaje conforme con la especificación ECMAScript</p>
<ul>
<li>Es la implementación más popular de ECMAScript, pero no es la única</li>
</ul>
<p><img src="./images/ecmascript-vs-javascript-01.png" alt="" /></p>
<p>Las características principales de JavaScript se basan en el estándar ECMAScript, pero JavaScript tiene también otras características que no están en el estándar.</p>
<p>Cada navegador tiene su propia implementación de la interfaz ECMAScript</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="default fit-7" data-theme="dr-iissi" lang="C" class="default fit-7" data-marpit-pagination="7" style="--paginate:true;--class:default fit-7;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="timeline-ecmascript">Timeline ECMAScript</h1>
<p>1995: Sun Microsystems y Netscape anuncian JavaScript.</p>
<p>1997: Se propuso la primera versión del <code>ECMA-262</code> (<code>ECMAScript 1</code>).</p>
<p>1999: <code>ECMAScript 3</code>. Se añaden expresiones regulares y <code>try/catch</code></p>
<p>2009: <code>ECMAScript 5</code>. Se añade el soporte para <code>JSON</code>, funciones de iteración de arrays, y <code>use strict</code></p>
<p>2015: <code>ECMAScript 6</code>: Se añaden <code>let</code>/<code>const</code>, valores por defecto para los parámetros</p>
<p>Después de Junio 2015, el nombre <code>ECMAScript 6</code> pasó a ser <code>ECMAScript 2015</code> (<code>ES2015</code>), para llevar un control de los lanzamientos anuales del estándar.</p>
<p>2017: <code>ECMAScript 2017</code>: Se añaden propiedades de <code>Object</code>, <code>Shared Memory</code> y funciones <code>Async</code></p>
<p>Enero 2019: <code>ECMAScript 2019</code> (<code>ES2019</code>) o <code>ES10</code>.</p>
<p>Junio 2020: <code>ECMAScript 2020</code> o <code>ES11</code>: <code>Nullish coalescence operator</code>, <code>BigInt</code></p>
<p>…</p>
<p>Junio 2023: <code>ECMAScript 2023</code>: Métodos nuevos para <code>Array</code></p>
<p>Julio 2024: <code>ECMAScript 2024</code>: Método <code>groupBy()</code> para <code>Object</code> y <code>Map</code>, métodos para comprobar si una cadena está bien formada</p>
<p>Junio 2025: <code>ECMAScript 2025</code>: Nuevos métodos para iteradores, operaciones con conjuntos, mejoras en expresiones regulares.</p>
</section>

<h1 id="java-vs-javascript">Java vs JavaScript</h1>
<div class="col left">
<p>Solo comparten el nombre y una sintaxis similar</p>
<p>JavaScript inicialmente se denominó Mocha, después LiveScript y finalmente JavaScript (coincidiendo con el momento en que Netscape empezó a soportar Java en su navegador).</p>
<ul>
<li>La versión de Internet Explorer se llamó JScript, dado que JavaScript era un nombre registrado</li>
</ul>
</div>
<div class="col right">
<p><img src="./images/java-vs-javascript-01.png" alt="" /></p>
</div>
</section>

</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="two-col v-align" data-theme="dr-iissi" lang="C" class="two-col v-align" data-marpit-pagination="10" style="--paginate:true;--class:two-col v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="contexto-de-javascript-1">Contexto de JavaScript</h1>
<div class="col left">
<p><img src="./images/contexto-de-javascript-04.png" alt="" /></p>
</div>
<div class="col right">
<pre class="language-html" data-lang="html"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>...<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>Website<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
      <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">write</span>(<span class="hljs-string">&quot;¡Hola, mundo!&quot;</span>);
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="11" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="c%C3%B3digo-javascript">Código JavaScript</h1>
<p>Ubicación</p>
<ul>
<li>
<p>En el documento HTML</p>
<ul>
<li>Dentro del elemento <code>head</code></li>
<li>Dentro del elemento <code>body</code></li>
<li>Como gestor de evento <code>onEvento=&quot;código&quot;</code></li>
</ul>
</li>
<li>
<p>En un archivo separado</p>
<ul>
<li>Fichero <code>.js</code></li>
</ul>
</li>
<li>
<p>Antes, el código JS que se incluía directamente en el documento HTML debía ir entre comentarios HTML  por motivos de compatibilidad.</p>
<ul>
<li>Hoy en día no es necesario, salvo que se necesite compatibilidad con navegadores muy antiguos</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="12" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="orden-de-ejecuci%C3%B3n-del-c%C3%B3digo">Orden de ejecución del código</h1>
<div class="v-body">
<p>Dentro de un documento HTML, pueden aparecer fragmentos de código JavaScript tanto en la cabecera como en distintas partes del cuerpo.</p>
<p>El código JavaScript se ejecuta siempre en el orden en el que aparece en el código HTML.</p>
<p>Lo habitual dentro del elemento <code>head</code> es poner sólo declaraciones de variables y funciones.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="13" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="script-dentro-del-documento-body">Script dentro del documento (body)</h1>
<div class="v-body">
<pre class="language-html" data-lang="html"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>Título del documento<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
    <span class="hljs-comment">&lt;!-- otra información de cabecera --&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-comment">&lt;!-- contenido del documento --&gt;</span>
    <span class="hljs-comment">&lt;!-- más contenido del documento --&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
      <span class="hljs-comment">// Código JavaScript</span>
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="14" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="script-dentro-del-documento-head">Script dentro del documento (head)</h1>
<div class="v-body">
<pre class="language-html" data-lang="html"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>Título del documento<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
    <span class="hljs-comment">&lt;!-- otra información de cabecera --&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
      <span class="hljs-comment">// Código JavaScript</span>
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-comment">&lt;!-- contenido del documento --&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="15" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="script-en-un-fichero-separado-js">Script en un fichero separado (.js)</h1>
<pre class="language-html" data-lang="html"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>Título del documento<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
    <span class="hljs-comment">&lt;!-- otra información de cabecera --&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;micodigo.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-comment">&lt;!-- contenido del documento --&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>
</code></pre>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-comment">// Fichero micodigo.js</span>

<span class="hljs-comment">// Código JS</span>
</code></pre>
<p>Si usamos HTML5, no es necesario usar el atributo type pues, por defecto, se considera que el código es JavaScript</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="16" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">

<ul>
<li>
<p>Introducción a ECMAScript y JavaScript</p>
</li>
<li>
<p><strong>Sintaxis JavaScript</strong></p>
</li>
<li>
<p>Clases y funciones predefinidas</p>
</li>
<li>
<p>Browser Object Model</p>
</li>
<li>
<p>Depuración JS</p>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="17" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="variables">Variables</h1>
<p>Se pueden definir con <code>var</code> o <code>let</code></p>
<ul>
<li>
<p>Las variables definidas con <code>var</code> tienen ámbito de función (o global si se declaran fuera de una función). Se pueden redefinir en el mismo ámbito donde se declaran.</p>
</li>
<li>
<p>Las variables definidas con <code>let</code> tienen el ámbito del bloque donde son declaradas (función, <code>if</code>, <code>for</code>, objeto…). No se pueden redefinir en el mismo ámbito donde se declaran.</p>
</li>
</ul>
<p>En código JS moderno se recomienda usar <code>let</code>, ya que tiene un comportamiento más parecido a otros lenguajes.</p>
<p>Se pueden declarar constantes con <code>const</code>.</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">var</span> age = <span class="hljs-number">24</span>;
<span class="hljs-keyword">let</span> empName = <span class="hljs-string">&quot;Juan&quot;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="18" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="variables-1">Variables</h1>
<div class="v-body">
<p>JavaScript es sensible a las mayúsculas y las minúsculas, por lo que una variable nombre no es la misma que otra Nombre.</p>
<p>No es obligatorio declarar las variables, pero se recomienda.</p>
<ul>
<li>Ojo, con el modo estricto sí es obligatorio</li>
</ul>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> nPract = <span class="hljs-number">10</span>, nTheory = <span class="hljs-number">9</span>;
<span class="hljs-keyword">let</span> nTotal = (nPract * <span class="hljs-number">0.6</span>) + (nTheory * <span class="hljs-number">0.4</span>);
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="19" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="variables-2">Variables</h1>
<p>Ámbito (scope): Determina desde dónde son accesibles las variables que se definen</p>
<p>Tipos de ámbito</p>
<ul>
<li><strong>Global</strong>: Variable definida fuera de una función; es accesible desde todo el código/script de una página web</li>
<li><strong>Local</strong>: Variable definida dentro de una función; es accesible desde la función donde se define</li>
<li><strong>De bloque</strong>: Variable definida con <code>let</code> dentro de un bloque; es accesible desde el bloque</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-class="two-col v-align" data-theme="dr-iissi" lang="C" class="two-col v-align" data-marpit-pagination="20" style="--paginate:true;--class:two-col v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="local-vs-global">Local vs Global</h1>
<div class="col left">
<p>Local</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-comment">// aquí NO se puede usar empName</span>

<span class="hljs-keyword">function</span> <span class="hljs-title function_">myFunction</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">let</span> empName = <span class="hljs-string">&quot;Juan&quot;</span>;
  <span class="hljs-comment">// aquí se puede usar empName</span>
}
</code></pre>
</div>
<div class="col right">
<p>Global</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> empName = <span class="hljs-string">&quot;Juan&quot;</span>;
<span class="hljs-comment">// aquí SÍ se puede usar empName</span>
<span class="hljs-keyword">function</span> <span class="hljs-title function_">myFunction</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">let</span> empName = <span class="hljs-string">&quot;Juan&quot;</span>;
  <span class="hljs-comment">// aquí también se puede usar empName</span>
}
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="21" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="bloque">Bloque</h1>
<div class="v-body">
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-comment">// aquí NO se puede usar empName</span>

<span class="hljs-keyword">function</span> <span class="hljs-title function_">myFunction</span>(<span class="hljs-params"></span>) {
  {
    <span class="hljs-keyword">let</span> empName = <span class="hljs-string">&quot;Juan&quot;</span>;

    <span class="hljs-comment">// aquí se puede usar empName</span>
  }
  <span class="hljs-comment">// aquí NO se puede usar empName</span>
}
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="22" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="comentarios">Comentarios</h1>
<div class="v-body">
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-comment">// Esto es un comentario de una línea</span>

<span class="hljs-comment">/* Esto es un comentario
...  de varias líneas */</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-class="two-col" data-theme="dr-iissi" lang="C" class="two-col" data-marpit-pagination="23" style="--paginate:true;--class:two-col;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="flujo-condicional">Flujo condicional</h1>
<div class="col left">
<p><code>if-else</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">if</span> (condition) {
  <span class="hljs-title function_">doSomething</span>();
} <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (anotherCondition) {
  <span class="hljs-title function_">doSomethingElse</span>();
} <span class="hljs-keyword">else</span> {
  <span class="hljs-title function_">doAnotherThing</span>();
}
</code></pre>
</div>
<div class="col right">
<p><code>switch</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">switch</span> (x) {
  <span class="hljs-keyword">case</span> <span class="hljs-number">1</span>:
    <span class="hljs-title function_">xIs1</span>();
    <span class="hljs-keyword">break</span>;
  <span class="hljs-keyword">case</span> <span class="hljs-number">2</span>:
    <span class="hljs-title function_">xIs2</span>();
  <span class="hljs-attr">default</span>:
    <span class="hljs-title function_">xIsOther</span>();
}
</code></pre>
<p>Operador ternario</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> x = (number % <span class="hljs-number">2</span> === <span class="hljs-number">0</span>) ? <span class="hljs-string">&quot;Even&quot;</span> : <span class="hljs-string">&quot;Odd&quot;</span>;
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="two-col" data-theme="dr-iissi" lang="C" class="two-col" data-marpit-pagination="24" style="--paginate:true;--class:two-col;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="bucles">Bucles</h1>
<div class="col left">
<p><code>for</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> i = <span class="hljs-number">0</span>; i &lt; array.<span class="hljs-property">length</span>; i++) {
  <span class="hljs-keyword">let</span> elem = array[i];
  ...
}
</code></pre>
<p><code>while</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">while</span> (condition) {
  ...
}
</code></pre>
</div>
<div class="col right">
<p><code>for...of</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> elem <span class="hljs-keyword">of</span> array) {
  ...
}
</code></pre>
<p><code>do-while</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">do</span> {
  ...
} <span class="hljs-keyword">while</span> (condition);
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="25" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="funciones">Funciones</h1>
<p>Notación estándar</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">foo</span>(<span class="hljs-params">arg1, arg2, arg3</span>) {
  <span class="hljs-comment">// Do something...</span>
}
</code></pre>
<p>Notación flecha</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> <span class="hljs-title function_">foo</span> = (<span class="hljs-params">arg1, arg2, arg3</span>) =&gt; {
  <span class="hljs-comment">// Do something...</span>
};
</code></pre>
<p>La notación flecha se suele utilizar para funciones anónimas o de una línea, ya que queda más conciso:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">add</span>(<span class="hljs-params">x, y</span>) {
  <span class="hljs-keyword">return</span> x + y;
}
<span class="hljs-comment">// VS</span>
(x, y) =&gt; x + y;
</code></pre>
<p>¡Las funciones también son variables y se pueden referenciar por su nombre!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="26" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="contenidos-2">Contenidos</h1>
<ul>
<li>
<p>Introducción a ECMAScript y JavaScript</p>
</li>
<li>
<p>Sintaxis JavaScript</p>
</li>
<li>
<p><strong>Clases y funciones predefinidas</strong></p>
</li>
<li>
<p>Browser Object Model</p>
</li>
<li>
<p>Depuración JS</p>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="27" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="tipos-b%C3%A1sicos">Tipos básicos</h1>
<p>Primitivos: Solo contienen un valor a la vez</p>
<ul>
<li>Cadenas: <code>&quot;¡Hola, mundo!&quot;</code>, <code>'epi@barriosesamo.es'</code></li>
<li>Números: <code>12</code>, <code>22.4</code>, <code>-5</code></li>
<li>Booleans: <code>true</code>, <code>false</code></li>
</ul>
<p>Compuestos: Contienen colecciones de valores y tipos más complejos de datos</p>
<ul>
<li><code>Object</code></li>
<li><code>Array</code></li>
<li><code>Function</code></li>
</ul>
<p>Nulos:</p>
<ul>
<li><code>undefined</code></li>
<li><code>null</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="28" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="cadenas-i">Cadenas (I)</h1>
<p>Se definen como secuencias de caracteres entre comillas simples (' '), dobles (&quot; &quot;) o acentos graves (` `)</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> a = <span class="hljs-string">&#x27;Comillas simples&#x27;</span>;
<span class="hljs-keyword">let</span> b = <span class="hljs-string">&quot;Comillas dobles&quot;</span>;
</code></pre>
<p>La secuencia puede incluir a su vez comillas simples o dobles, siempre que no cierren las comillas abiertas previamente (si lo hacen, hay que escaparlas):</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-comment">// comilla simple dentro de comillas dobles let a = &quot;Let&#x27;s have a cup of coffee.&quot;;</span>
<span class="hljs-keyword">let</span> a = <span class="hljs-string">&quot;Let&#x27;s hava a cup of coffee.&quot;</span>; 

<span class="hljs-comment">// comillas dobles dentro de comillas simples</span>
<span class="hljs-keyword">let</span> b = <span class="hljs-string">&#x27;He said &quot;Hello&quot; and left.&#x27;</span>;

<span class="hljs-comment">// Escape de comillas</span>
<span class="hljs-keyword">let</span> c = <span class="hljs-string">&#x27;We\&#x27;ll never give up.&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="29" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="cadenas-ii">Cadenas (II)</h1>
<p>Las cadenas definidas con acentos graves (` `) pueden contener comillas simples y dobles:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> x = <span class="hljs-string">`This is a &quot;string&quot; with both &#x27;types&#x27; of quotes`</span>;
</code></pre>
<p>Las cadenas definidas mediante estos acentos pueden contener variables mediante la sintaxis <code>${}</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> name = <span class="hljs-string">&quot;John&quot;</span>;
<span class="hljs-keyword">let</span> age = <span class="hljs-number">30</span>;
<span class="hljs-comment">// Interpolación de variables</span>
<span class="hljs-keyword">let</span> x = <span class="hljs-string">`My name is <span class="hljs-subst">${name}</span> and I&#x27;m <span class="hljs-subst">${age}</span> years old`</span>;
<span class="hljs-comment">// x = &quot;My name is John and I’m 30 years old&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="default fit-4" data-theme="dr-iissi" lang="C" class="default fit-4" data-marpit-pagination="30" style="--paginate:true;--class:default fit-4;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="clase-string">Clase String</h1>
<p>Propiedades</p>
<ul>
<li><code>length</code>: longitud de la cadena.</li>
</ul>
<p>Métodos</p>
<ul>
<li><code>charAt(n)</code>: devuelve el carácter colocado en la posición <code>n</code></li>
<li><code>match(c)</code>:  dice si la subcadena <code>c</code> pertenece a la cadena</li>
<li><code>substring(x,y)</code>: devuelve la subcadena que va de <code>x</code> a <code>y</code> (no incluido)</li>
<li><code>substr(x,y)</code>: devuelve la subcadena que empieza en la posición <code>x</code> y tiene <code>y</code> caracteres.</li>
<li><code>toLowerCase()</code>: convierte a mayúsculas</li>
<li><code>toUpperCase()</code>: convierte a minúsculas</li>
<li><code>replace()</code>: cambia las ocurrencias de una subcadena por otra</li>
<li><code>concat()</code>: une dos o más cadenas</li>
<li><code>trim()</code>: elimina espacios en blanco al principio y al final de la cadena</li>
<li><code>split()</code>: dado un separador, parte la cadena y la convierte en un array</li>
<li><code>toString()</code>: convierte un objeto en una cadena</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="31" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplos-%E2%80%93-funciones-de-string">Ejemplos – Funciones de String</h1>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> str = <span class="hljs-string">&quot;Hi, I&#x27;m a string&quot;</span>;

<span class="hljs-keyword">let</span> thirdCharacter = str.<span class="hljs-title function_">charAt</span>(<span class="hljs-number">2</span>);
<span class="hljs-comment">// thirdCharacter = &quot;,&quot;</span>

<span class="hljs-keyword">let</span> substring = str.<span class="hljs-title function_">substring</span>(<span class="hljs-number">0</span>, <span class="hljs-number">3</span>);
<span class="hljs-comment">// substring = &quot;Hi,&quot;</span>

<span class="hljs-keyword">let</span> upper = str.<span class="hljs-title function_">toUpperCase</span>();
<span class="hljs-comment">// upper = &quot;HI, I&#x27;M A STRING&quot;</span>

<span class="hljs-keyword">let</span> lower = str.<span class="hljs-title function_">toLowerCase</span>();
<span class="hljs-comment">// lower = &quot;hi, i&#x27;m a string&quot;</span>

<span class="hljs-keyword">let</span> includes = str.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;string&quot;</span>);
<span class="hljs-comment">// includes = true</span>

<span class="hljs-keyword">let</span> replaced = str.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;string&quot;</span>, <span class="hljs-string">&quot;text&quot;</span>);
<span class="hljs-comment">// replaced = &quot;Hi, I&#x27;m a text&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="32" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="arrays">Arrays</h1>
<p>Colecciones de datos ordenados:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> ls = [<span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Bob&quot;</span>, <span class="hljs-string">&quot;Charlie&quot;</span>];
</code></pre>
<p>Acceso mediante índices:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> x = ls[<span class="hljs-number">1</span>];  <span class="hljs-comment">// x = &quot;Bob&quot;</span>
ls[<span class="hljs-number">2</span>] = <span class="hljs-string">&quot;Mary&quot;</span>; <span class="hljs-comment">// ls = [&quot;Alice&quot;, &quot;Bob&quot;, &quot;Mary&quot;]</span>
</code></pre>
<p>Iterables mediante <code>for...of</code></p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> name <span class="hljs-keyword">of</span> ls) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(name);
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-class="default fit-5" data-theme="dr-iissi" lang="C" class="default fit-5" data-marpit-pagination="33" style="--paginate:true;--class:default fit-5;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="clase-array">Clase Array</h1>
<p>Propiedades</p>
<ul>
<li><code>length</code>: longitud del array</li>
</ul>
<p>Métodos</p>
<ul>
<li><code>join()</code>: representa todos los elementos en una cadena usando un separador (por defecto, coma)</li>
<li><code>reverse()</code>: invierte el orden de los elementos</li>
<li><code>sort()</code>: ordena los elementos del array</li>
<li><code>concat()</code>: Une los elementos de dos arrays en uno solo</li>
<li><code>filter()</code>: Devuelve un array que retiene los elementos del array original que cumplen una determinada condición , expresada como una función</li>
<li><code>find()</code>: Devuelve el primer elemento de un array que cumple una determinada condición, expresada como una función</li>
<li><code>indexOf()</code>: Busca un elemento en el array y devuelve su posición</li>
<li><code>pop()</code>: Devuelve y elimina el último elemento de un array</li>
<li><code>push()</code>: Añade al final del array un elemento</li>
<li><code>slice()</code>: Devuelve un fragmento del array</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="34" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplos-%E2%80%93-funciones-de-array-i">Ejemplos – funciones de Array (I)</h1>
<p><code>join()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
<span class="hljs-keyword">let</span> string = fruits.<span class="hljs-title function_">join</span>();
<span class="hljs-comment">// string = &quot;Banana,Orange,Peach,Mango&quot;</span>
</code></pre>
<p><code>reverse()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
fruits.<span class="hljs-title function_">reverse</span>();
<span class="hljs-comment">// fruits = [&quot;Mango&quot;, &quot;Peach&quot;, &quot;Orange&quot;, &quot;Banana&quot;]</span>
</code></pre>
<p><code>sort()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
fruits.<span class="hljs-title function_">sort</span>();
<span class="hljs-comment">// fruits = [&quot;Banana&quot;, &quot;Mango&quot;, &quot;Orange&quot;, &quot;Peach&quot;]</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="35" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplos-%E2%80%93-funciones-de-array-ii">Ejemplos – funciones de Array (II)</h1>
<p><code>concat()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
<span class="hljs-keyword">let</span> moreFruits = [<span class="hljs-string">&quot;Strawberry&quot;</span>, <span class="hljs-string">&quot;Pear&quot;</span>];

<span class="hljs-keyword">let</span> allFruits = fruits.<span class="hljs-title function_">concat</span>(moreFruits);
<span class="hljs-comment">// allFruits = [&quot;Banana&quot;, &quot;Orange&quot;, &quot;Peach&quot;, &quot;Mango&quot;, &quot;Strawberry&quot;, &quot;Pear&quot;]</span>
</code></pre>
<p><code>filter()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">isAdult</span>(<span class="hljs-params">age</span>) {
  <span class="hljs-keyword">return</span> age &gt;= <span class="hljs-number">18</span>;
}

<span class="hljs-keyword">let</span> ages = [<span class="hljs-number">32</span>, <span class="hljs-number">33</span>, <span class="hljs-number">16</span>, <span class="hljs-number">40</span>, <span class="hljs-number">12</span>];
<span class="hljs-keyword">let</span> adults = ages.<span class="hljs-title function_">filter</span>(isAdult);

<span class="hljs-comment">// adults = [32,33,40]</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="36" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplos-%E2%80%93-funciones-de-array-iii">Ejemplos – funciones de Array (III)</h1>
<p><code>find()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">isAdult</span>(<span class="hljs-params">age</span>) {
  <span class="hljs-keyword">return</span> age &gt;= <span class="hljs-number">18</span>;
}

<span class="hljs-keyword">let</span> ages = [<span class="hljs-number">32</span>, <span class="hljs-number">33</span>, <span class="hljs-number">16</span>, <span class="hljs-number">40</span>];
<span class="hljs-keyword">let</span> firstAdult = ages.<span class="hljs-title function_">find</span>(isAdult);
<span class="hljs-comment">// firstAdult = 32</span>
</code></pre>
<p><code>indexOf()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
<span class="hljs-keyword">let</span> posPeach = fruits.<span class="hljs-title function_">indexOf</span>(<span class="hljs-string">&quot;Peach&quot;</span>);
<span class="hljs-comment">// posPeach = 2</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="37" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplos-%E2%80%93-funciones-de-array-iv">Ejemplos – funciones de Array (IV)</h1>
<p><code>pop()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
<span class="hljs-keyword">let</span> last = fruits.<span class="hljs-title function_">pop</span>();
<span class="hljs-comment">// last = &quot;Mango&quot;</span>
<span class="hljs-comment">// fruits = [&quot;Banana&quot;, &quot;Orange&quot;, &quot;Peach&quot;]</span>
</code></pre>
<p><code>push()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
fruits.<span class="hljs-title function_">push</span>(<span class="hljs-string">&quot;Kiwi&quot;</span>);
<span class="hljs-comment">// fruits = [&quot;Banana&quot;, &quot;Orange&quot;, &quot;Peach&quot;, &quot;Mango&quot;, &quot;Kiwi&quot;]</span>
</code></pre>
<p><code>slice()</code>:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Orange&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>, <span class="hljs-string">&quot;Mango&quot;</span>];
<span class="hljs-keyword">let</span> someFruits = fruits.<span class="hljs-title function_">slice</span>(<span class="hljs-number">1</span>, <span class="hljs-number">3</span>);
<span class="hljs-comment">// someFruits = [&quot;Orange&quot;, &quot;Peach&quot;]</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="38" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objects-i">Objects (I)</h1>
<p>Conjuntos de atributo-valor, similares a los <code>Maps</code> de <code>Java</code> o los <code>Dicts</code> de <code>Python</code>*:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> person = { <span class="hljs-attr">age</span>: <span class="hljs-number">24</span>, <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;John&quot;</span> };

<span class="hljs-keyword">let</span> car = {
  <span class="hljs-attr">wheels</span>: <span class="hljs-number">4</span>,
  <span class="hljs-attr">manufacturer</span>: <span class="hljs-string">&quot;Toyota&quot;</span>,
  <span class="hljs-attr">model</span>: <span class="hljs-string">&quot;GT86&quot;</span>,
};
</code></pre>
<p>Acceso a los valores:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> empName = person.<span class="hljs-property">name</span>;  <span class="hljs-comment">// empName = &quot;John&quot;</span>

<span class="hljs-keyword">let</span> key = <span class="hljs-string">&quot;wheels&quot;</span>;
<span class="hljs-keyword">let</span> numWheels = car[key];  <span class="hljs-comment">// numWheels = 4</span>
</code></pre>
<h3 id="los-atributos-de-un-object-son-todos-de-tipo-string-si-se-necesitan-atributos-de-otro-tipo-se-debe-usar-la-clase-map-de-js">*Los atributos de un <code>Object</code> son todos de tipo <code>String</code>. Si se necesitan atributos de otro tipo, se debe usar la clase <code>Map</code> de JS.</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="39" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objects-ii">Objects (II)</h1>
<p>Los valores de un <code>Object</code> pueden ser funciones:</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">sayHi</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Hi!&quot;</span>);
}

<span class="hljs-keyword">let</span> person = { <span class="hljs-attr">age</span>: <span class="hljs-number">24</span>, <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;John&quot;</span>, <span class="hljs-attr">greeting</span>: sayHi };

person.<span class="hljs-title function_">greeting</span>();  <span class="hljs-comment">// prints &quot;Hi!&quot;</span>
</code></pre>
<p>Los nombres de los atributos de un <code>Object</code> se pueden iterar mediante <code>for…in</code>*</p>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">for</span> (<span class="hljs-keyword">let</span> key <span class="hljs-keyword">in</span> person) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(key);  <span class="hljs-comment">// &quot;age&quot;, &quot;name&quot;, &quot;greeting&quot;</span>
}
</code></pre>
<h3 id="no-confundir-con-forof-para-iterar-sobre-elementos-de-un-array">*No confundir con <code>for…of</code> para iterar sobre elementos de un array</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-class="default fit-4" data-theme="dr-iissi" lang="C" class="default fit-4" data-marpit-pagination="40" style="--paginate:true;--class:default fit-4;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="referencias-constantes">Referencias constantes</h1>
<p>Se definen con la palabra reservada <code>const</code>.</p>
<p>Es obligatorio asignarles un valor en su declaración.</p>
<p>Su ámbito es de bloque (igual que las variables <code>let</code>)</p>
<p>Se comportan como las variables definidas mediante <code>let</code>, excepto que no se pueden reasignar (se quedan con el valor que se les asigna inicialmente en su declaración).</p>
<p>No son inmutables, son referencias constantes a un valor</p>
<ul>
<li>Si el valor es un tipo primitivo, ya no se puede cambiar (en ese caso, sí es inmutable)</li>
<li>Si el valor es un objeto, se pueden cambiar los valores de las propiedades del objeto (no la referencia al objeto)</li>
<li>Por ejemplo, se puede declarar mediante <code>const</code> un array y cambiar los elementos del array, o declarar un objeto y cambiar un atributo</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="41" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplos---const">Ejemplos - Const</h1>
<div class="v-body">
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">const</span> age = <span class="hljs-number">23</span>;
age = <span class="hljs-number">55</span>; <span class="hljs-comment">// ERROR</span>

<span class="hljs-keyword">const</span> employee = { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Juan López&quot;</span>, <span class="hljs-attr">salary</span>: <span class="hljs-number">1500</span> };
employee.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;Ana López&quot;</span>; <span class="hljs-comment">// Correcto</span>
employee = { <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Ana López&quot;</span>, <span class="hljs-attr">salary</span>: <span class="hljs-number">1500</span> }; <span class="hljs-comment">// ERROR</span>

<span class="hljs-keyword">const</span> fruits = [<span class="hljs-string">&quot;Banana&quot;</span>, <span class="hljs-string">&quot;Pear&quot;</span>, <span class="hljs-string">&quot;Peach&quot;</span>];
<span class="hljs-comment">// Modificar un elemento:</span>
fruits[<span class="hljs-number">0</span>] = <span class="hljs-string">&quot;Melon&quot;</span>; <span class="hljs-comment">// Correcto</span>
<span class="hljs-comment">// Añadir un elemento:</span>
fruits.<span class="hljs-title function_">push</span>(<span class="hljs-string">&quot;Kiwi&quot;</span>); <span class="hljs-comment">// Correcto</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="42" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="otras-clases-predefinidas">Otras clases predefinidas</h1>
<div class="v-body">
<h2 id="number-math-date"><code>Number</code>, <code>Math</code>, <code>Date</code>, …</h2>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="43" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="clase-number">Clase Number</h1>
<p>En JavaScript, solo hay un tipo numérico, que puede representarse con o sin decimales (también en notación científica)</p>
<p>Propiedades:</p>
<ul>
<li><code>MAX_VALUE</code>: Número máximo posible</li>
<li><code>MIN_VALUE</code>: Número mínimo posible</li>
<li><code>NaN</code>: <code>Not a Number</code> (p.ej. raíces negativas)</li>
</ul>
<p>Métodos:</p>
<ul>
<li><code>isInteger()</code>: comprueba si el número es entero</li>
<li><code>isNaN()</code>: comprueba si el número es <code>NaN</code></li>
<li><code>toExponential(n)</code>: convierte el número a la notación exponencial</li>
<li><code>toPrecision(p)</code>:  formatea un número a una precisión de longitud <code>p</code></li>
<li><code>toString()</code>: Convierte un número a cadena</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="44" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="clase-math">Clase Math</h1>
<p>Métodos:</p>
<ul>
<li><code>abs(num)</code>: función valor absoluto</li>
<li><code>max(x,y)</code>: devuelve el máximo de <code>x</code> e <code>y</code></li>
<li><code>min(x,y)</code>: devuelve el mínimo de <code>x</code> e <code>y</code></li>
<li><code>pow(base, exp)</code>: potencia</li>
<li><code>random()</code>: devuelve un número aleatorio en <code>[0,1]</code></li>
<li><code>round(num)</code>: redondea al entero más cercano</li>
<li><code>sin(num)</code>: función seno</li>
<li><code>sqrt(num)</code>: función raíz cuadrada</li>
<li><code>tan(num)</code>: función tangente</li>
<li>...</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-class="default fit-3" data-theme="dr-iissi" lang="C" class="default fit-3" data-marpit-pagination="45" style="--paginate:true;--class:default fit-3;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="clase-date">Clase Date</h1>
<p>Métodos</p>
<ul>
<li><code>getDate()</code>: devuelve el día del mes actual como un entero entre <code>1</code> y <code>31</code></li>
<li><code>getDay()</code>: devuelve el día de la semana actual como un entero entre <code>0</code> y <code>6</code> (<code>0</code> = Domingo)</li>
<li><code>getHours()</code>: devuelve la hora del día actual como un entero entre <code>0</code> y <code>23</code>.</li>
<li><code>getMinutes()</code>: devuelve los minutos de la hora actual como un entero entre <code>0</code> y <code>59</code>.</li>
<li><code>getMonth()</code>: devuelve el mes del año actual como un entero entre <code>0</code> y <code>11</code>.</li>
<li><code>getSeconds()</code>: devuelve los segundos del minuto actual como un entero entre <code>0</code> y <code>59</code>.</li>
<li><code>getFullYear()</code>: devuelve el año actual. NO USAR <code>getYear()</code>, deprecado</li>
<li><code>getTime()</code>: devuelve el tiempo transcurrido en milisegundos desde el 1 de enero de 1970 (<code>epoch</code>) hasta el momento actual</li>
<li><code>getISOString()</code>: devuelve la hora actual en formato estandarizado (recomendable para comunicación cliente-servidor)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="46" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplo-%E2%80%93-date-i">Ejemplo – Date (I)</h1>
<div class="v-body">
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">let</span> now = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>();
<span class="hljs-comment">// now = Tue Feb 15 2022 12:47:58 GMT+0100</span>

<span class="hljs-keyword">let</span> day = now.<span class="hljs-title function_">getDate</span>();
<span class="hljs-comment">// day = 15</span>

<span class="hljs-keyword">let</span> dayOfTheWeek = now.<span class="hljs-title function_">getDay</span>(); <span class="hljs-comment">// Entre 0 y 6!</span>
<span class="hljs-comment">// dayOfTheWeek = 2 (Martes)</span>

<span class="hljs-keyword">let</span> hour = now.<span class="hljs-title function_">getHours</span>();
<span class="hljs-comment">// hour = 12</span>

<span class="hljs-keyword">let</span> minutes = now.<span class="hljs-title function_">getMinutes</span>();
<span class="hljs-comment">// minutes = 47</span>

<span class="hljs-keyword">let</span> seconds = now.<span class="hljs-title function_">getSeconds</span>();
<span class="hljs-comment">// seconds = 58</span>

<span class="hljs-keyword">let</span> isoString = now.<span class="hljs-title function_">toISOString</span>();
<span class="hljs-comment">// isoString = &quot;2022-02-15T11:47:58.082Z&quot;</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="47" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="ejemplo-%E2%80%93-date-ii">Ejemplo – Date (II)</h1>
<div class="v-body">
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">dayOfTheWeek</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">let</span> today = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Date</span>();

  <span class="hljs-keyword">let</span> days = {
    <span class="hljs-number">0</span>: <span class="hljs-string">&quot;Sunday&quot;</span>,
    <span class="hljs-number">1</span>: <span class="hljs-string">&quot;Monday&quot;</span>,
    <span class="hljs-number">2</span>: <span class="hljs-string">&quot;Tuesday&quot;</span>,
    <span class="hljs-number">3</span>: <span class="hljs-string">&quot;Wednesday&quot;</span>,
    <span class="hljs-number">4</span>: <span class="hljs-string">&quot;Thursday&quot;</span>,
    <span class="hljs-number">5</span>: <span class="hljs-string">&quot;Friday&quot;</span>,
    <span class="hljs-number">6</span>: <span class="hljs-string">&quot;Saturday&quot;</span>,
  };

  <span class="hljs-keyword">let</span> currentDay = days[today.<span class="hljs-title function_">getDay</span>()];
  <span class="hljs-keyword">return</span> currentDay;
}
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="48" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">

</li>
<li>

</li>
<li>
<p>Clases y funciones predefinidas</p>

<h1 id="browser-object-model-bom">Browser Object Model (BOM)</h1>
<p>Cuando se usa JavaScript en un navegador, están disponibles varios objetos predefinidos:</p>
<ul>
<li>Algunos están asociados con el propio navegador (BOM – Browser Object Model)</li>
<li>Otros están relacionados con la estructura del documento HTML (DOM) y son accesibles desde el objeto document:</li>
</ul>
<pre class="language-html" data-lang="html"><code class="language-html">(...)
  <span class="hljs-tag">&lt;<span class="hljs-name">img</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;imgmail&quot;</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;mail.jpg&quot;</span> /&gt;</span>
(...)
</code></pre>
<pre class="language-javascript" data-lang="javascript"><code class="language-javascript">(...)
  <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">getElementById</span>(<span class="hljs-string">&quot;imgmail&quot;</span>).<span class="hljs-property">src</span> = <span class="hljs-string">&quot;mail2.jpg&quot;</span>;
(...)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-class="two-col v-align" data-theme="dr-iissi" lang="C" class="two-col v-align" data-marpit-pagination="50" style="--paginate:true;--class:two-col v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objetos-predefinidos-bom">Objetos predefinidos BOM</h1>
<div class="col left">
<p><code>window</code>: la ventana del navegador.<br />
<code>screen</code>: la pantalla.<br />
<code>navigator</code>: el propio navegador.<br />
<code>history</code>: la historia de navegación.<br />
<code>location</code>: la URL de la página actual.</p>
</div>
<div class="col right">
<p><img src="./images/objetos-predefinidos-bom-01.png" alt="" /></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="51" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objeto-window">Objeto <code>window</code></h1>
<p>Representa a la ventana del navegador.</p>
<p>Propiedades</p>
<ul>
<li><code>status</code>: mensaje de la barra de estado</li>
<li><code>document</code>: documento HTML visualizado</li>
<li><code>history</code>: historial de navegación</li>
<li><code>closed</code>: <code>true</code> si la ventana está cerrada</li>
<li><code>length</code>: número de <code>frames</code> que contiene la ventana</li>
<li><code>frames</code>: un array que contiene todos los <code>frames</code> que tiene la ventana, es decir, devuelve un array de objetos de tipo <code>Frame</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="52" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objeto-window-1">Objeto <code>window</code></h1>
<p>Métodos</p>
<ul>
<li><code>open(url)</code>: abre una nueva ventana del navegador</li>
<li><code>close()</code>: cierra la ventana</li>
<li><code>alert(msg)</code>: muestra una ventana con un mensaje</li>
</ul>
<p><img src="./images/objeto-window-01.png" alt="" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="53" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objeto-window-2">Objeto <code>window</code></h1>
<p>Métodos</p>
<ul>
<li><code>confirm(msg)</code>: muestra una ventana con un botón de cancelar y otro de aceptar; devuelve <code>true</code> si se ha pulsado aceptar y <code>false</code> si se ha pulsado cancelar</li>
</ul>
<p><img src="./images/objeto-window-02.png" alt="" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="54" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objeto-window-3">Objeto <code>window</code></h1>
<p>Métodos</p>
<ul>
<li><code>prompt(msg, default)</code>: muestra una ventana de entrada de datos con un valor por defecto</li>
</ul>
<p><img src="./images/objeto-window-03.png" alt="" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="55" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objeto-navigator">Objeto <code>navigator</code></h1>
<p>Representa al propio navegador.</p>
<p>Propiedades:</p>
<ul>
<li><code>appName</code>: nombre del navegador: <code>Edge</code>, <code>Firefox</code>, <code>Chrome</code>, <code>Opera</code>… en realidad, todos devuelven <code>Netscape</code> por compatibilidad antigua
<ul>
<li>No existe una manera fácil de saber cuál es el navegador actual, normalmente se usa <code>navigator.userAgent</code>, aunque los navegadores pueden &quot;mentir&quot; por privacidad</li>
</ul>
</li>
<li><code>mimeTypes</code>: un array con los tipos que soporta el navegador (<code>Application</code>, <code>Audio</code>, <code>Image</code>, <code>Message</code>, <code>Multipart</code>, <code>Text</code>, <code>Video</code>…)</li>
<li><code>plugins</code>: un array con los plugins que tiene instalado el navegador
<ul>
<li>Por privacidad, no muestra los que ha instalado el usuario</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="56" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="objeto-location">Objeto <code>location</code></h1>
<p>Representa a la URL del documento mostrado en <code>window</code></p>
<p>Propiedades:</p>
<ul>
<li><code>host</code>: Contiene el nombre del servidor que ha servido la página y el número de puerto de la URL</li>
<li><code>hostname</code>: nombre del servidor</li>
<li><code>pathname</code>: camino sin incluir ni el servidor ni el puerto</li>
<li><code>port</code>: puerto</li>
<li><code>protocol</code>: protocolo (<code>http</code>, <code>ftp</code>,..)</li>
<li><code>href</code>: URL que se puede cambiar dinámicamente</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="57" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">

<ul>
<li>

</li>
<li>
<p>Sintaxis JavaScript</p>
</li>
<li>
<p>Clases y funciones predefinidas</p>
</li>
<li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="58" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="depuraci%C3%B3n">Depuración</h1>
<p>Recordatorio: Depurar consiste en encontrar el error que hay tras un fallo en el funcionamiento de un programa</p>
<p>En JavaScript, la depuración es especialmente complicada, dado que muchos errores no se ven en pantalla (solo en la consola)</p>
<p>Todos los navegadores modernos tienen un depurador JavaScript incorporado</p>
<ul>
<li>Se pueden activar/desactivar</li>
<li>Permiten añadir <code>breakpoints</code> y examiner el valor de las variables</li>
<li>Normalmente se activan con <code>F12</code> y seleccionando <code>Console</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-class="two-col v-align" data-theme="dr-iissi" lang="C" class="two-col v-align" data-marpit-pagination="59" style="--paginate:true;--class:two-col v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="consolelog"><code>console.log</code></h1>
<div class="col left">
<pre class="language-html" data-lang="html"><code class="language-html"><span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>Depurando con console.log<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
      a = <span class="hljs-number">5</span>;
      b = <span class="hljs-number">6</span>;
      c = a + b;
      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(c);
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span>
</code></pre>
</div>

<h1 id="breakpoints">Breakpoints</h1>
<div class="v-body">
<p>En la Ventana de depuración, se pueden añadir <code>breakpoints</code></p>
<p>En cada <code>breakpoint</code>, JavaScript parará la ejecución y permitirá que el desarrollador examine los valores de las variables.</p>
<p>Después, se puede reanudar la ejecución del código.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="61" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">

<h1 id="la-palabra-debugger">La palabra debugger</h1>
<div class="col left">
<p>La palabra reservada <code>debugger</code> detiene la ejecución de JavaScript, y llama a la función de depuración (si está disponible).</p>
<p>Tiene el mismo efecto que definir un <code>breakpoint</code> en el depurador.</p>
<p>Si no hay depurador disponible, no tiene efecto.</p>
<pre class="language-html" data-lang="html"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
  a = <span class="hljs-number">5</span>;
  b = <span class="hljs-number">6</span>;
  c = a + b;
  <span class="hljs-keyword">debugger</span>;
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(c);
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
</code></pre>
</div>

<p><img src="./images/la-palabra-debugger-01.png" alt="" /></p>

<h1 id="ejercicios">Ejercicios</h1>
<p>Entre en HackerRank y resuelva los primeros retos del tutorial en 10 días:</p>
<ul>
<li>Day 0: Hello World!</li>
<li>Day 0: Data Types</li>
<li>Day 1: Arithmetic operators</li>

<li>Day 1: Let and const</li>

<h1 id="conclusiones">Conclusiones</h1>
<div class="v-body">
<ul>
<li>
<p><strong>JavaScript</strong> es el lenguaje de programación más extendido en la <strong>Web</strong> y su evolución está marcada por el estándar <strong>ECMAScript</strong>.</p>
</li>
<li>
<p>La <strong>sintaxis básica</strong> de JavaScript se apoya en <strong>variables</strong>, <strong>ámbito</strong>, <strong>estructuras de control</strong> y <strong>funciones</strong>, y conviene usar <code>let</code> y <code>const</code> en código moderno.</p>
</li>
<li>
<p>Los tipos y estructuras más habituales son <strong>cadenas</strong>, <strong>arrays</strong> y <strong>objetos</strong>, que permiten modelar y manipular datos de forma flexible.</p>
</li>
</ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="70" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
<h1 id="conclusiones-1">Conclusiones</h1>
<div class="v-body">
<ul>
<li>
<p>Las clases predefinidas como <strong>String</strong>, <strong>Array</strong>, <strong>Number</strong>, <strong>Math</strong> y <strong>Date</strong> ofrecen <strong>métodos</strong> y <strong>propiedades</strong> que simplifican muchas operaciones comunes.</p>
</li>
<li>
<p>En el navegador, el <strong>BOM</strong> proporciona acceso a objetos como <strong>window</strong>, <strong>navigator</strong> y <strong>location</strong>, que conectan JavaScript con el entorno de ejecución.</p>
</li>
<li>
<p>La <strong>depuración</strong> con <strong>console.log</strong>, <strong>breakpoints</strong> y <code>debugger</code> es clave para entender el flujo del programa y localizar errores con rapidez.</p>
</li>
</ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-class="title" data-theme="dr-iissi" lang="C" class="title" data-marpit-pagination="71" style="--paginate:true;--class:title;--theme:dr-iissi;" data-marpit-pagination-total="71" data-size="16:9">
