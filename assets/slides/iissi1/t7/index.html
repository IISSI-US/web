<h1 id="%C2%BFqu%C3%A9-es-una-base-de-datos">¿Qué es una base de datos?</h1>
<p>Un sistema de gestión de base de datos (SGBD) es un sistema informático que:</p>
<ul>
<li>Implementa (principalmente) las funciones de memoria e informativa de un sistema de información.</li>
<li>Almacena grandes volúmenes de datos.</li>
<li>Gestiona el acceso concurrente a los datos.</li>
<li>Mantiene la integridad semántica de los datos.</li>
<li>Controla el acceso a los datos.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-class="two-col-3-7 v-align" data-theme="dr-iissi" lang="C" class="two-col-3-7 v-align" data-marpit-pagination="6" style="--paginate:true;--class:two-col-3-7 v-align;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="trazabilidad">Trazabilidad</h1>
<div class="col left">
<p>El producto previo al diseño de una BD es el modelo conceptual</p>
</div>
<div class="col right">
<p><img src="./images/trazabilidad-hacia-otros-productos.png" alt="" /></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="7" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="introducci%C3%B3n-pasado">Introducción. Pasado</h1>
<p>Sistemas pre-relacionales (antes de 1970)</p>
<ul>
<li>Basados en archivos: secuenciales e indexados</li>
<li>Bases de datos jerárquicas: IMS</li>
<li>Bases de datos en red: CODASYL</li>
</ul>
<p>Sistemas relacionales (desde 1970)</p>
<ul>
<li>Experimentales: RDMS, Ingres, ...</li>
<li>Comerciales: Oracle, DB2, MS SQL Server, ...</li>
<li>Open source: PostgreSQL, MySQL, MariaDB, SQLite, ...</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="8" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="introducci%C3%B3n-presente">Introducción. Presente</h1>
<p>Hoy conviven varios tipos de bases de datos. La elección depende del problema.</p>
<ul>
<li><strong>Relacionales (SQL)</strong>: Datos transaccionales con reglas de integridad fuertes. PostgreSQL, MySQL, SQL Server, Oracle, ...</li>
<li><strong>Documentales</strong>: Datos semiestructurados (JSON), esquemas flexibles.MongoDB, Couchbase, ...</li>
<li><strong>Clave-valor</strong>: Caché, sesiones, contadores, colas simples. Redis, DynamoDB (modo KV), ...</li>
<li><em>Grafos</em>: Relaciones complejas (redes sociales, fraude, recomendación). Neo4j, JanusGraph, ...</li>
<li>Otras familias NoSQL frecuentes
<ul>
<li><em>Columna ancha</em>: Cassandra, HBase.</li>
<li><em>Series temporales</em>: InfluxDB, TimescaleDB.</li>
<li><em>Búsqueda/analítica</em>: Elasticsearch, OpenSearch.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="9" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="introducci%C3%B3n-futuro">Introducción. Futuro</h1>
<p><strong>Tendencia</strong>: consumir capacidades de backend como servicio gestionado.</p>
<ul>
<li>Backend as a Service (<strong>BaaS</strong>)
<ul>
<li>Proporciona componentes listos: autenticación, base de datos, almacenamiento, API, notificaciones, funciones serverless.</li>
<li>Reduce tiempo de desarrollo y operaciones en proyectos pequeños y medianos.</li>
<li>Ejemplos de plataformas: Firebase, Supabase, Appwrite, AWS Amplify.</li>
</ul>
</li>
<li>Ventajas
<ul>
<li>Salida rápida al mercado.</li>
<li>Escalado y seguridad base gestionados por el proveedor.</li>
<li>Menor coste inicial de infraestructura.</li>
</ul>
</li>
<li>Riesgos y límites
<ul>
<li>Dependencia del proveedor (vendor lock-in).</li>
<li>Menor control fino de arquitectura y costes a gran escala.</li>
<li>Necesidad de diseñar portabilidad desde el inicio.</li>
</ul>
</li>
</ul>
</section>

<h1 id="or%C3%ADgenes">Orígenes</h1>
<p>Codd, E. F. A Relational Model of Data for Large Shared Data Banks. Communications of the ACM 13 (6): 377–387. <a href="https://dl.acm.org/doi/10.1145/362384.362685">Link</a></p>
<ul>
<li>
<p>Modelo sencillo y flexible basado en fundamentos matemáticos de teoría de conjuntos y lógica de predicados.</p>
</li>
<li>
<p>Primeras implementaciones:</p>
<ul>
<li>RDMS (MIT), primeros años de los 70</li>
<li>Ingres (Universidad de Berkeley), 1974</li>
<li>Oracle V2, 1979</li>
<li>IBM System R/DB2, 1979</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="12" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="%C2%BFqu%C3%A9-es-una-relaci%C3%B3n">¿Qué es una relación?</h1>
<p>Una relación está compuesta por una intensión y por una extensión.</p>
<p>La intensión define un conjunto de atributos, cada uno de los cuales toma valores sobre un dominio.</p>
<p>Por ejemplo, para una relación denominada Empleado, su intensión podría ser:</p>
<ul>
<li><strong>nif</strong>:  Naturales de 8 dígitos seguidos de una letra mayúscula</li>
<li><strong>nss</strong>: Naturales de 12 dígitos</li>
<li><strong>nombre</strong>: Cadenas menores de 50 caracteres</li>
<li><strong>edad</strong>: Naturales menores o iguales a 200</li>
<li><strong>salario</strong>: Reales positivos</li>
<li><strong>estadoCivil</strong>: enumerado ( soltero, casado, viudo, ...)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="13" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="%C2%BFqu%C3%A9-es-una-relaci%C3%B3n-1">¿Qué es una relación?</h1>
<p>La extensión es un conjunto de tuplas, cada una formada por conjuntos de pares (atributo, valor), de forma que a cada atributo de la intensión se le asocia un valor del dominio sobre el que está definido.</p>
<p>Por ejemplo, para la relación Empleados, su extensión podría ser:</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-comment">-- Intensión</span>
<span class="mr-relation">Empleados</span> = <span class="mr-brace">{</span> nif, nss, nombre, edad, salario, estadoCivil <span class="mr-brace">}</span>

<span class="mr-comment">-- Extensión</span>
<span class="mr-relation">Empleados</span> = <span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;12.345.678-Z&#39;</span>, <span class="mr-string">&#39;123.456.789&#39;</span>, <span class="mr-string">&#39;Abel Abad&#39;</span>, 21, 12000, <span class="mr-string">&#39;Soltero&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;23.456.789-D&#39;</span>, <span class="mr-string">&#39;234.567.890&#39;</span>, <span class="mr-string">&#39;Braulio Brío&#39;</span>, 32, 23000, <span class="mr-string">&#39;Casado&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;34.567.890-V&#39;</span>, <span class="mr-string">&#39;345.678.901&#39;</span>, <span class="mr-string">&#39;Carlos Cepa&#39;</span>, 43, 34000, <span class="mr-string">&#39;Separado&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;45.678.901-G&#39;</span>, <span class="mr-string">&#39;456.789.012&#39;</span>, <span class="mr-string">&#39;David Díaz&#39;</span>, 54, 45000, <span class="mr-string">&#39;Divorciado&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;56.789.012-B&#39;</span>, <span class="mr-string">&#39;567.890.123&#39;</span>, <span class="mr-string">&#39;Enrique Estepa&#39;</span>, 65, 56000, <span class="mr-string">&#39;Casado&#39;</span><span class="mr-paren">)</span>
<span class="mr-brace">}</span>
</code></pre>
<p><strong>Grado</strong>: número de atributos (columnas)<br />
<strong>Cardinalidad</strong>: número de tuplas de la extesión (filas)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-class="two-col-7-3 v-align" data-theme="dr-iissi" lang="C" class="two-col-7-3 v-align" data-marpit-pagination="14" style="--paginate:true;--class:two-col-7-3 v-align;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="implementaci%C3%B3n-del-concepto-de-relaci%C3%B3n">Implementación del concepto de relación</h1>
<div class="col left">
<p>El concepto de relación se implementa mediante una tabla, cuyas columnas representan los atributos y las filas las tuplas.</p>
<p>Las diferencias con una relación son:</p>
<ul>
<li>Las filas están ordenadas, las tuplas no.</li>
<li>Las filas pueden estar repetidas, las tuplas no.</li>
<li>Las columnas (además de un nombre) tienen un orden, los atributos no.</li>
</ul>
</div>
<div class="col right">
<p><img src="./images/implementacion-del-concepto-de-relacion-01.png" alt="" /></p>
<h6 id="larry-ellison">Larry Ellison</h6>
<p><img src="./images/implementacion-del-concepto-de-relacion-02.png" alt="" /></p>
<h6 id="edgar-f-codd">Edgar F. Codd</h6>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="15" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="%C2%BFqu%C3%A9-es-un-dominio">¿Qué es un dominio?</h1>
<p>Es el conjunto de valores admisibles que puede tomar un atributo de una relación.</p>
<p>Pueden ser:</p>
<ul>
<li>Un tipo básico sin restricciones: enteros, cadenas, …</li>
<li>Un tipo básico con restricciones: reales &lt; 100, cadenas de longitud ≤ 50, naturales &gt; 20, …</li>
<li>Un tipo enumerado: lunes, martes, miércoles, …</li>
<li>Un tipo compuesto: fechas (dd/mm/aaaa), horas (hh:mm:ss), …</li>
</ul>
<p>Todos los dominios deben tener definido el operador de igualdad (<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo>=</mo></mrow><annotation encoding="application/x-tex">=</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.3669em;"></span><span class="mrel">=</span></span></span></span>).</p>
<p>Algunos dominios tienen su propia álgebra con operadores <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo>+</mo></mrow><annotation encoding="application/x-tex">+</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6667em;vertical-align:-0.0833em;"></span><span class="mord">+</span></span></span></span>, <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo>−</mo></mrow><annotation encoding="application/x-tex">-</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6667em;vertical-align:-0.0833em;"></span><span class="mord">−</span></span></span></span>, <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo>∗</mo></mrow><annotation encoding="application/x-tex">*</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4653em;"></span><span class="mord">∗</span></span></span></span>, <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi mathvariant="normal">/</mi></mrow><annotation encoding="application/x-tex">/</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord">/</span></span></span></span>, ...</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="16" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="%C2%BFqu%C3%A9-es-el-valor-nulo">¿Qué es el valor nulo?</h1>
<p>Si un atributo tiene valor nulo (null), significa que no se conoce su valor, que es desconocido.</p>
<p>El valor nulo puede asignarse a atributos definidos sobre cualquier dominio, pero no pueden compararse valores nulos de atributos definidos sobre dominios diferentes.</p>
<p>La introducción del valor nulo implica la necesidad de una lógica trivaluada:</p>
<table>
<thead>
<tr>
<th>A</th>
<th>B</th>
<th>A OR B</th>
<th>A AND B</th>
<th>NOT A</th>
</tr>
</thead>
<tbody>
<tr>
<td>true</td>
<td>null</td>
<td>true</td>
<td>null</td>
<td>false</td>
</tr>
<tr>
<td>false</td>
<td>null</td>
<td>null</td>
<td>false</td>
<td>true</td>
</tr>
<tr>
<td>null</td>
<td>null</td>
<td>null</td>
<td>null</td>
<td>null</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="17" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="contenido-3">Contenido</h1>
<ul>
<li>Introducción</li>
<li>Conceptos básicos</li>
<li><strong>Claves</strong></li>
<li>Integridad</li>
<li>Anomalías de manipulación</li>

</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="18" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="superclaves---unicidad">Superclaves - Unicidad</h1>
<p>Una Superclave es un subconjunto de atributos (descriptor) de una relación que identifica de manera única a las tuplas de dicha relación.</p>
<p>Criterio de <strong>unicidad</strong>:</p>
<ul>
<li>Un descriptor es único si no tiene sentido* que existan dos tuplas distintas en una relación con los mismos valores de dicho descriptor.</li>
<li>Toda Superclave cumple este criterio</li>
</ul>
<blockquote>
<p>* Si no tiene sentido en el dominio del problema, asumiendo que una relación representa una parte de un modelo conceptual, como se verá en los próximos temas.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="19" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="clave-candidata">Clave Candidata</h1>
<p>En cualquier relación, siempre existe una superclave formada por todos los atributos, ya que no puede haber tuplas repetidas.</p>
<p>Una relación puede tener varias superclaves.</p>
<p>Criterio de <strong>Minimalidad</strong>:</p>
<ul>
<li>Una Superclave es Mínima si al eliminar cualquier atributo de su descriptor deja de cumplir el criterio de unicidad.</li>
<li>Las Superclaves que cumplen este criterio se denominan Claves Candidatas (cumplen unicidad y minimalidad)</li>
</ul>
<p>Hay que evitar las Superclaves que no son Claves Candidatas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="20" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="candidatas-primarias-y-alternativas">Candidatas, Primarias y Alternativas</h1>
<p>Claves candidatas</p>
<ul>
<li>Una relación siempre tiene al menos una clave candidata, aunque puede tener varias.</li>
</ul>
<p>Clave primaria (<strong>PK</strong>)</p>
<ul>
<li>Clave candidata seleccionada arbitrariamente como mecanismo de identificación de la relación.</li>
</ul>
<p>Clave alternativa (<strong>AK</strong>)</p>
<ul>
<li>Cualquier clave candidata no seleccionada como primaria.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="21" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="relaciones-entre-claves">Relaciones entre claves</h1>
<p><img src="./images/relaciones-entre-claves.png" alt="" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="22" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="claves-ajenas-fk">Claves ajenas (FK)</h1>
<p>Las claves ajenas son conjuntos de atributos de una relación cuyos valores deben coincidir con los de la clave primaria de otra relación.</p>
<p>Es la forma de representar las asociaciones del modelo conceptual en el modelo relacional.</p>
<p>Se debe evitar ponerles nombres distintos a la clave primaria</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">CentroSalud</span> = <span class="mr-brace">{</span>centroSaludId, dirección, teléfono<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>centroSaludId<span class="mr-paren">)</span>
<span class="mr-relation">CentroSalud</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;Carretera de Carmona 48,     Sevilla&#39;</span>, <span class="mr-string">&#39;954 954 954&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;Avenida de la Innovación 12, Sevilla&#39;</span>, <span class="mr-string">&#39;955 123 456&#39;</span><span class="mr-paren">)</span>
<span class="mr-brace">}</span>

<span class="mr-relation">Persona</span> = <span class="mr-brace">{</span>personaId, nif, nss, nombre, centroSaludId<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>personaId<span class="mr-paren">)</span>
    <span class="mr-keyword">FK</span><span class="mr-paren">(</span>centroSaludId<span class="mr-paren">)</span> / CentroSalud
    <span class="mr-keyword">AK</span><span class="mr-paren">(</span>nif<span class="mr-paren">)</span>
    <span class="mr-keyword">AK</span><span class="mr-paren">(</span>nss<span class="mr-paren">)</span>
<span class="mr-relation">Persona</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;28456319H&#39;</span>, <span class="mr-string">&#39;281234567890&#39;</span>, <span class="mr-string">&#39;Ana Romero&#39;</span>,  1<span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;51789234M&#39;</span>, <span class="mr-string">&#39;281234567891&#39;</span>, <span class="mr-string">&#39;Luis Ortega&#39;</span>, 1<span class="mr-paren">)</span>
<span class="mr-brace">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="23" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="24" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="integridad-de-la-entidad">Integridad de la entidad</h1>
<p>Ningún atributo que forme parte de la clave primaria de una relación puede tomar el valor nulo.</p>
<p>Esta regla de integridad garantiza la identificación de tuplas mediante valores de la clave primaria.</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Empleado</span> = <span class="mr-brace">{</span>nif, nss, nombre, edad, salario, estadoCivil<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>nif<span class="mr-paren">)</span>
    <span class="mr-keyword">AK</span><span class="mr-paren">(</span>nss<span class="mr-paren">)</span>

<span class="mr-relation">Empleado</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;12.345.678-Z&#39;</span>, <span class="mr-string">&#39;123.456.789&#39;</span>, <span class="mr-string">&#39;Abel Abad&#39;</span>,      21, 12000, <span class="mr-string">&#39;soltero&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-null">null</span>,           <span class="mr-string">&#39;234.567.890&#39;</span>, <span class="mr-string">&#39;Braulio Brío&#39;</span>,   32, 23000, <span class="mr-string">&#39;casado&#39;</span><span class="mr-paren">)</span>, -- viola regla
    <span class="mr-paren">(</span><span class="mr-string">&#39;34.567.890-V&#39;</span>, <span class="mr-string">&#39;345.678.901&#39;</span>, <span class="mr-string">&#39;Carlos Cepa&#39;</span>,    43, 34000, <span class="mr-string">&#39;separado&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;45.678.901-G&#39;</span>, <span class="mr-string">&#39;456.789.012&#39;</span>, <span class="mr-string">&#39;David Díaz&#39;</span>,     54, 45000, <span class="mr-string">&#39;divorciado&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;56.789.012-B&#39;</span>, <span class="mr-string">&#39;567.890.123&#39;</span>, <span class="mr-string">&#39;Enrique Estepa&#39;</span>, 65, 56000, <span class="mr-string">&#39;casado&#39;</span><span class="mr-paren">)</span>
<span class="mr-brace">}</span>
</code></pre>
<blockquote>
<p>El valor de una PK nunca puede ser nulo</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="two-col fit-2" data-theme="dr-iissi" lang="C" class="two-col fit-2" data-marpit-pagination="25" style="--paginate:true;--class:two-col fit-2;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="integridad-referencial">Integridad referencial</h1>
<div class="col left">
<p>Todos los atributos de una clave ajena deben tomar valores que coincidan con valores de la clave primaria correspondiente o bien tomar valores nulos.</p>
<p>Esta regla de integridad garantiza que todas las tuplas con claves ajenas se relacionan con otras tuplas existentes o bien con ninguna.</p>
</div>
<div class="col right">
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Empleado</span> = <span class="mr-brace">{</span>nss, nif, nombre, edad, centroSaludId<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>nif<span class="mr-paren">)</span>
    <span class="mr-keyword">AK</span><span class="mr-paren">(</span>nss<span class="mr-paren">)</span>
    <span class="mr-keyword">FK</span><span class="mr-paren">(</span>centroSaludId<span class="mr-paren">)</span> / CentroSalud
<span class="mr-relation">Empleado</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;123.456.789&#39;</span>, <span class="mr-string">&#39;12.345.678-Z&#39;</span>, <span class="mr-string">&#39;Abel&#39;</span>,    21, 48<span class="mr-paren">)</span>,

<h1 id="calidad-de-los-modelos-relacionales">Calidad de los modelos relacionales</h1>
<div class="v-body">
<p>La calidad de un modelo relacional depende, entre otros factores, de las anomalías de manipulación que presente.</p>
<p>La forma de asegurar la calidad de un modelo relacional frente a las anomalías de manipulación es comprobar que está al menos en tercera forma normal (3FN).</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="28" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="anomal%C3%ADas-de-manipulaci%C3%B3n">Anomalías de manipulación</h1>
<p>Supongamos una relación que contiene los datos de los inmuebles de una agencia de alquiler.</p>
<p>Cada inmueble tiene un código, una dirección, un precio de alquiler, una lista de propietarios con el porcentaje de propiedad del inmueble, y el código, nombre y cargo del empleado que lo gestiona.</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span>inmuebleId, dirección, precio, propietarios, empleadoId, nombre, cargo<span class="mr-brace">}</span>

<span class="mr-relation">Inmuebles</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600, <span class="mr-string">&#39;P. Río, 70% / D. Páez, 30%&#39;</span>, 3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;30A&#39;</span>, <span class="mr-string">&#39;C/ Sur, 15&#39;</span>,   500, <span class="mr-string">&#39;E. Ruz, 100%&#39;</span>,               3, <span class="mr-string">&#39;S. Díaz&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;87B&#39;</span>, <span class="mr-string">&#39;C/ Este, 8&#39;</span>,   700, <span class="mr-string">&#39;R. Bas, 50% / P. Río, 50%&#39;</span>,  5, <span class="mr-string">&#39;N. Clos&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;91A&#39;</span>, <span class="mr-string">&#39;C/ Oeste, 10&#39;</span>, 650, <span class="mr-string">&#39;M. Gil, 40% / M. Quer, 60%&#39;</span>, 8, <span class="mr-string">&#39;G. Peña&#39;</span>, <span class="mr-string">&#39;Comercial&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;23B&#39;</span>, <span class="mr-string">&#39;C/ Sol, 14&#39;</span>,   800, <span class="mr-string">&#39;R. Mel, 70% / J. Val, 30%&#39;</span>,  8, <span class="mr-string">&#39;G. Peña&#39;</span>, <span class="mr-string">&#39;Comercial&#39;</span><span class="mr-paren">)</span>
<span class="mr-brace">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="29" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="%C2%BFqu%C3%A9-problemas-presenta-la-relaci%C3%B3n">¿Qué problemas presenta la relación?</h1>
<p><strong>Datos redundantes</strong>: el nombre y el cargo de cada empleado se repita tantas veces como inmuebles gestione, malgastando espacio.</p>
<p><strong>Riesgos de incoherencia</strong>: la redundancia de datos implica el riesgo de que se vuelvan incoherentes si no se actualizan todas las ocurrencias a la vez.</p>
<p><strong>Anomalías de inserción</strong>: hasta que un empleado no gestione un inmueble no se puede registrar en el sistema de información.</p>
<p><strong>Anomalías de actualización</strong>: si un empleado cambia de cargo hay que actualizarlo múltiples veces en lugar de hacerlo una sola vez.</p>
<p><strong>Anomalías de eliminación</strong>: si un empleado deja de gestionar inmuebles, sus datos desaparecen del sistema de información.</p>
<p><strong>Problemas de consulta</strong>: ¿cómo se podrían conocer todos los inmuebles de un determinado propietario?</p>
</section>

<p>¿Cuántos problemas de los anteriores se evitan con el nuevo modelo relacional de tres relaciones?</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-comment">-- Intensión </span>

    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>empleadoId<span class="mr-paren">)</span>
<span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span> inmuebleId, propietarioId, empleadoId, dirección, precio<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>inmuebleId<span class="mr-paren">)</span>
    <span class="mr-keyword">FK</span><span class="mr-paren">(</span>empleadoId<span class="mr-paren">)</span> / Empleados
<span class="mr-relation">Propietarios</span> = <span class="mr-brace">{</span>propietarioId, inmuebleId, nombre, porcentaje<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>propietarioId<span class="mr-paren">)</span>
    <span class="mr-keyword">FK</span><span class="mr-paren">(</span>inmuebleId<span class="mr-paren">)</span> / Inmuebles
<span class="mr-comment">-- Extensión</span>
<span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, 1, 3, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600<span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;30A&#39;</span>, 3, 3, <span class="mr-string">&#39;C/ Sur, 15&#39;</span>,  500<span class="mr-paren">)</span>, ... <span class="mr-brace">}</span>
<span class="mr-relation">Empleados</span> = <span class="mr-brace">{</span>
    <span class="mr-paren">(</span>3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>, ... <span class="mr-brace">}</span>
<span class="mr-relation">Propietarios</span> = <span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;P. Río&#39;</span>,  70<span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;D. Páez&#39;</span>, 30<span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>3, <span class="mr-string">&#39;30A&#39;</span>, <span class="mr-string">&#39;E. Ruz&#39;</span>,  100<span class="mr-paren">)</span>, ... <span class="mr-brace">}</span>
</code></pre>

<h1 id="%C2%BFqu%C3%A9-es-una-dependencia-funcional">¿Qué es una dependencia funcional?</h1>
<p>Si <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>R</mi></mrow><annotation encoding="application/x-tex">R</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.00773em;">R</span></span></span></span> es una relación y <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>X</mi></mrow><annotation encoding="application/x-tex">X</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span></span></span></span> e <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>Y</mi></mrow><annotation encoding="application/x-tex">Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span> son dos subconjuntos de los atributos de <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>R</mi></mrow><annotation encoding="application/x-tex">R</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.00773em;">R</span></span></span></span>, se dice que <strong><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>X</mi></mrow><annotation encoding="application/x-tex">X</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span></span></span></span> determina funcionalmente a <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>Y</mi></mrow><annotation encoding="application/x-tex">Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span></strong> o que <strong><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>Y</mi></mrow><annotation encoding="application/x-tex">Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span> depende funcionalmente de <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>X</mi></mrow><annotation encoding="application/x-tex">X</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span></span></span></span></strong>, si y sólo si <strong>siempre</strong> que dos tuplas tienen los mismos valores de <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>X</mi></mrow><annotation encoding="application/x-tex">X</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span></span></span></span>, también tienen los mismos valores de <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>Y</mi></mrow><annotation encoding="application/x-tex">Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span>.</p>

<h1 id="%C2%BFc%C3%B3mo-se-identifican-las-dependencias-funcionales">¿Cómo se identifican las dependencias funcionales?</h1>
<p>Las dependencias funcionales <strong>no pueden deducirse de los datos</strong> de la extensión de una relación.</p>
<p>Sólo podría descartarse su existencia si los datos de la extensión las contradijeran.</p>
<p>Por lo tanto...</p>
<blockquote>
<p>Las dependencias funcionales dependen de la semántica de los atributos de las relaciones en el modelo conceptual y, por extensión, en el dominio del problema.</p>
</blockquote>

<span class="mr-brace">}</span>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="36" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="grafo-de-dependencias-funcionales">Grafo de dependencias funcionales</h1>
<p>Forma gráfica de representar las dependencias funcionales de un modelo relacional.</p>
<p>Los <strong>nodos</strong> son <strong>atributos</strong> o conjuntos de atributos.</p>
<p>Los <strong>arcos</strong> son las <strong>dependencias funcionales</strong>.</p>
<p>Normalmente sólo se representan dependencias funcionales que determinan a un solo atributo.</p>
<p><img src="./puml/t8-grafo-dependencias-funcionales.svg" alt="" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-class="content" data-theme="dr-iissi" lang="C" class="content" data-marpit-pagination="37" style="--paginate:true;--class:content;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="contenido-7">Contenido</h1>
<ul>
<li>Introducción</li>
<li>Conceptos básicos</li>
<li>Claves</li>
<li>Integridad</li>
<li>Anomalías de manipulación</li>
<li>Dependencias funcionales</li>
<li><strong>Formas normales</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="38" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="formas-normales">Formas normales</h1>
<p>Son <strong>condiciones</strong>, basadas en las dependencias funcionales, que debe cumplir un modelo relacional <strong>para estar exento de anomalías de manipulación</strong>.</p>
<p>Originalmente, Codd propuso tres formas normales: <strong>1FN, 2FN y 3FN</strong>.</p>
<p>Posteriormente, se han propuesto otras tres: Boyce-Codd FN, 4FN y 5FN.</p>
<p><strong>Cada FN incluye a la anterior</strong>, por lo que un modelo relacional en 3FN está también en 2FN y en 1FN.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-class="two-col fit-2" data-theme="dr-iissi" lang="C" class="two-col fit-2" data-marpit-pagination="39" style="--paginate:true;--class:two-col fit-2;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="primera-forma-normal-1fn">Primera forma normal (1FN)</h1>
<div class="col left">
<p>Una relación está en 1FN si en cada tupla se le asigna a cada atributo <strong>un solo valor del dominio</strong> sobre el que está definido.</p>
<p>Esto implica la ausencia de <strong>grupos repetidos</strong>.</p>
</div>
<div class="col right">
<p>Ejemplo:</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-comment">-- 1FN OK (una tupla por teléfono)</span>
<span class="mr-relation">Clientes</span> = <span class="mr-brace">{</span>clienteId, nombre, teléfono<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>clienteId, teléfono<span class="mr-paren">)</span>

<span class="mr-relation">Clientes</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;Abel Abad&#39;</span>, <span class="mr-string">&#39;666111222&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;Braulio Brío&#39;</span>, <span class="mr-string">&#39;666222333&#39;</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
<p>Deja de estar en 1FN por pasar de uno a varios teléfonos por cliente</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-comment">-- 1FN FAIL (grupo repetido en teléfono)</span>
<span class="mr-relation">Clientes</span> = <span class="mr-brace">{</span>clienteId, nombre, teléfono<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>clienteId<span class="mr-paren">)</span>

<span class="mr-relation">Clientes</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;Abel Abad&#39;</span>, <span class="mr-string">&#39;666111222&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;Braulio Brío&#39;</span>, <span class="mr-string">&#39;666222333 / 666555666 &#39;</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-class="default fit-3" data-theme="dr-iissi" lang="C" class="default fit-3" data-marpit-pagination="40" style="--paginate:true;--class:default fit-3;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="ejemplo-1fn---clientes">Ejemplo 1FN - Clientes</h1>
<p><strong>Ejemplo</strong>: Pasar de un teléfono por cliente a varios, sin conocer cuántos teléfonos puede tener un cliente</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Clientes</span> = <span class="mr-brace">{</span>clienteId, nombre, teléfono<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>clienteId<span class="mr-paren">)</span>

<span class="mr-relation">Clientes</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;Abel Abad&#39;</span>, <span class="mr-string">&#39;666111222&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;Braulio Brío&#39;</span>, <span class="mr-string">&#39;666222333&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>3, <span class="mr-string">&#39;Carlos Cepa&#39;</span>, <span class="mr-string">&#39;666333444&#39;</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
<p>Opción 1: cumple la 1FN, aunque no es la mejor:</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Clientes</span> = <span class="mr-brace">{</span>clienteId, nombre, teléfono1, teléfono2, teléfono3<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>clienteId<span class="mr-paren">)</span>

<span class="mr-relation">Clientes</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;Abel Abad&#39;</span>, <span class="mr-string">&#39;666111222&#39;</span>, <span class="mr-null">null</span>, <span class="mr-null">null</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;Braulio Brío&#39;</span>, <span class="mr-string">&#39;666222333&#39;</span>, <span class="mr-string">&#39;666555666&#39;</span>, <span class="mr-string">&#39;954456789&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>3, <span class="mr-string">&#39;Carlos Cepa&#39;</span>, <span class="mr-string">&#39;666333444&#39;</span>, <span class="mr-string">&#39;954123123&#39;</span>, <span class="mr-null">null</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-class="default fit-2" data-theme="dr-iissi" lang="C" class="default fit-2" data-marpit-pagination="41" style="--paginate:true;--class:default fit-2;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="ejemplo-1fn---clientes-1">Ejemplo 1FN - Clientes</h1>
<p><strong>Ejemplo</strong>: Pasar de un teléfono por cliente a varios, sin conocer cuántos teléfonos puede tener un cliente</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-comment">-- Intensión</span>
<span class="mr-relation">Clientes</span> = <span class="mr-brace">{</span>clienteId, nombre<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>clienteId<span class="mr-paren">)</span>
<span class="mr-relation">Clientes</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;Abel Abad&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;Braulio Brío&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>3, <span class="mr-string">&#39;Carlos Cepa&#39;</span><span class="mr-paren">)</span>, ... <span class="mr-brace">}</span>
<span class="mr-comment">-- Extensión</span>
<span class="mr-relation">Teléfonos</span> = <span class="mr-brace">{</span>clienteId, teléfono<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>clienteId, teléfono<span class="mr-paren">)</span>
    <span class="mr-keyword">FK</span><span class="mr-paren">(</span>clienteId<span class="mr-paren">)</span> / Clientes
<span class="mr-relation">Teléfonos</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span>1, <span class="mr-string">&#39;666111222&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;666222333&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;666555666&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span>2, <span class="mr-string">&#39;954456789&#39;</span><span class="mr-paren">)</span>, ... <span class="mr-brace">}</span>

</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-class="default fit-1" data-theme="dr-iissi" lang="C" class="default fit-1" data-marpit-pagination="42" style="--paginate:true;--class:default fit-1;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="ejemplo-1fn---inmuebles">Ejemplo 1FN - Inmuebles</h1>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span>inmuebleId, dirección, precio, propietarios, empleadoId, nombre, cargo<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>inmuebleId<span class="mr-paren">)</span>
<span class="mr-relation">Inmuebles</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600, <span class="mr-string">&#39;P. Río, 70% / D. Páez, 30%&#39;</span>, 3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;30A&#39;</span>, <span class="mr-string">&#39;C/ Sur, 15&#39;</span>,   500, <span class="mr-string">&#39;E. Ruz, 100%&#39;</span>,               3, <span class="mr-string">&#39;S. Díaz&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
<p>Partiendo el atributo propietarios en dos atributos con el nombre del propietario y su porcentaje se cumple con la 1FN.</p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span>inmuebleId, dirección, precio, propietario, porcentaje, empleadoId, nombre, cargo<span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>inmuebleId, propietario<span class="mr-paren">)</span>
<span class="mr-relation">Inmuebles</span> =<span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600, <span class="mr-string">&#39;P. Río&#39;</span>,  70,  3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600, <span class="mr-string">&#39;D. Páez&#39;</span>, 30,  3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;30A&#39;</span>, <span class="mr-string">&#39;C/ Sur, 15&#39;</span>,   500, <span class="mr-string">&#39;E. Ruz&#39;</span>,  100, 3, <span class="mr-string">&#39;S. Díaz&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
<blockquote>
<p>Nótese que ahora la PK es la pareja {inmuebleId,propietario}</p>
</blockquote>
<blockquote>
<p>Cuando el nombre de un atributo está en plural es señal de que el modelo está mal</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="43" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="segunda-forma-normal-2fn">Segunda forma normal (2FN)</h1>
<p>Una relación está en 2FN si está en 1FN y todos los atributos no primos son completamente dependientes de las claves candidatas de la relación.</p>
<p>Los atributos no primos son los que no forman parte de ninguna clave candidata.</p>
<p>Normalmente una relación no está en 2FN porque está representando varias entidades y asociaciones a la vez.</p>
<p>Siempre se puede transformar un modelo relacional que no esté en 2FN en otro que sí lo esté sin pérdidas de información ni dependencias.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="44" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="ejemplo-2fn---inmuebles">Ejemplo 2FN - Inmuebles</h1>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span> inmuebleId, dirección, precio, propietario, porcentaje, empleadoId, nombre, cargo <span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>inmuebleId, propietario<span class="mr-paren">)</span>
<span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span>
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600, <span class="mr-string">&#39;P. Río&#39;</span>, 70,  3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;10A&#39;</span>, <span class="mr-string">&#39;C/ Norte, 15&#39;</span>, 600, <span class="mr-string">&#39;D. Páez&#39;</span>, 30, 3, <span class="mr-string">&#39;S. Blas&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    <span class="mr-paren">(</span><span class="mr-string">&#39;30A&#39;</span>, <span class="mr-string">&#39;C/ Sur, 15&#39;</span>,   500, <span class="mr-string">&#39;E. Ruz&#39;</span>, 100, 3, <span class="mr-string">&#39;S. Díaz&#39;</span>, <span class="mr-string">&#39;Resp. Zona&#39;</span><span class="mr-paren">)</span>,
    ...
<span class="mr-brace">}</span>
</code></pre>
<p><img src="./puml/grafo-no-2fn.svg" alt="" /></p>
<blockquote>
<p>Dirección/precio depende sólo de inmuebleId (dependencia parcial)<br />
Nombre/cargo depende sólo de empleadoId (dependencia parcial)</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-class="default" data-theme="dr-iissi" lang="C" class="default" data-marpit-pagination="45" style="--paginate:true;--class:default;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="ejemplo-2fn---inmuebles-1">Ejemplo 2FN - Inmuebles</h1>
<p><img src="./puml/grafo-2fn.svg" alt="" /></p>
<pre class="language-mr" data-lang="mr"><code class="language-mr"><span class="mr-relation">Inmuebles</span> = <span class="mr-brace">{</span> inmuebleId, dirección, precio, empleadoId, nombre, cargo <span class="mr-brace">}</span>
    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>inmuebleId<span class="mr-paren">)</span>

    <span class="mr-keyword">PK</span><span class="mr-paren">(</span>inmuebleId, propietario<span class="mr-paren">)</span>
    <span class="mr-keyword">FK</span><span class="mr-paren">(</span>inmuebleId<span class="mr-paren">)</span> / Inmuebles

</section>

<h1 id="regla-general-para-la-2fn">Regla general para la 2FN</h1>
<p>Si en la relación <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>R</mi><mo stretchy="false">(</mo><msub><mi>K</mi><mn>1</mn></msub><mo separator="true">,</mo><msub><mi>K</mi><mn>2</mn></msub><mo separator="true">,</mo><mi>X</mi><mo separator="true">,</mo><mi>Y</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">R(K_1, K_2, X, Y)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.00773em;">R</span><span class="mopen">(</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span><span class="mclose">)</span></span></span></span> se tienen:</p>
<ul>
<li>los conjuntos de atributos primos: <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>K</mi><mn>1</mn></msub></mrow><annotation encoding="application/x-tex">K_1</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> y <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>K</mi><mn>2</mn></msub></mrow><annotation encoding="application/x-tex">K_2</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></li>
<li>los conjuntos de atributos no primos: <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>X</mi></mrow><annotation encoding="application/x-tex">X</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span></span></span></span> e <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>Y</mi></mrow><annotation encoding="application/x-tex">Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span></li>
<li>las dependencias funcionales: <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>K</mi><mn>1</mn></msub><mo>→</mo><mi>X</mi></mrow><annotation encoding="application/x-tex">K_1 \rightarrow X</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">→</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07847em;">X</span></span></span></span> y <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">{</mo><msub><mi>K</mi><mn>1</mn></msub><mo separator="true">,</mo><msub><mi>K</mi><mn>2</mn></msub><mo stretchy="false">}</mo><mo>→</mo><mi>Y</mi></mrow><annotation encoding="application/x-tex">\{K_1,K_2\} \rightarrow Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">{</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub </ul>

<ul>

<li><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>R</mi><mn>2</mn></msub><mo stretchy="false">(</mo><msub><mi>K</mi><mn>1</mn></msub><mo separator="true">,</mo><msub><mi>K</mi><mn>2</mn></msub><mo separator="true">,</mo><mi>Y</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">R_2(K_1, K_2, Y)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.00773em;">R</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0077em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span><span class="mclose">)</span></span></span></span> con <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">{</mo><msub><mi>K</mi><mn>1</mn></msub><mo separator="true">,</mo><msub><mi>K</mi><mn>2</mn></msub><mo stretchy="false">}</mo><mo>→</mo><mi>Y</mi></mrow><annotation encoding="application/x-tex">\{K_1,K_2\} \rightarrow Y</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">{</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">1</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.07153em;">K</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:-0.0715em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose">}</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">→</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span></li>

<h1 id="tercera-forma-normal-3fn">Tercera forma normal (3FN)</h1>
<p>Una relación está en 3FN si está en 2FN y ningún atributo no primo depende <strong>transitivamente</strong> de ninguna clave candidata.</p>
<p>Justificación de la 3FN</p>
<ul>
<li>Todos los atributos no primos deben representar un hecho sobre la clave, toda la clave y nada más que la clave.</li>
<li>Normalmente una relación no está en 3FN porque está representando varias entidades asociadas a la vez.</li>
</ul>
</section>

<h1 id="conclusiones">Conclusiones</h1>
<div class="v-body">
<p>Una <strong>base de datos</strong> organiza datos del mundo real para soportar procesos de <strong>consulta</strong> y <strong>gestión</strong>.</p>
<p>El <strong>modelo relacional</strong> representa la información mediante <strong>relaciones</strong>, <strong>tuplas</strong> y <strong>atributos</strong>.</p>
<p>La calidad del modelo depende de su capacidad para evitar <strong>redundancia</strong> y <strong>anomalías de manipulación</strong>.</p>
<p>El diseño relacional debe mantener <strong>trazabilidad</strong> con los requisitos y con el modelo conceptual previo.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-class="default v-align" data-theme="dr-iissi" lang="C" class="default v-align" data-marpit-pagination="53" style="--paginate:true;--class:default v-align;--theme:dr-iissi;" data-marpit-pagination-total="55" data-size="16:9">
<h1 id="conclusiones-1">Conclusiones</h1>
<div class="v-body">
<p>Las <strong>claves candidatas</strong> permiten identificar unívocamente tuplas; la <strong>clave primaria</strong> es una de ellas.</p>
<p>Las <strong>claves ajenas (FK)</strong> conectan relaciones y hacen explícitas las asociaciones del dominio.</p>
<p>La <strong>integridad de entidad</strong> exige PK no nula y sin duplicados.</p>
<p>La <strong>integridad referencial</strong> obliga a que toda FK apunte a una PK existente (o sea nula si procede).</p>
</div>
</section>

<h1 id="conclusiones-2">Conclusiones</h1>
<div class="v-body">
<p>Las <strong>dependencias funcionales</strong> capturan restricciones semánticas entre atributos.</p>
<p>La <strong>1FN</strong> elimina grupos repetidos y obliga a valores <strong>atómicos</strong>.</p>
<p>La <strong>2FN</strong> elimina dependencias <strong>parciales</strong> respecto a claves compuestas.</p>
<p>La <strong>3FN</strong> elimina dependencias <strong>transitivas</strong> y ayuda a obtener modelos más consistentes.</p>
</div>
</section>
