title: IISSI (2026/27)
description: Sitio de documentación con colecciones de Jekyll
locale: "es-ES"

# Usa Minimal Mistakes como remote theme (recomendado para GitHub Pages)
remote_theme: "mmistakes/minimal-mistakes@4.27.3"

# Configuración GitHub Pages / despliegue
url: ""
baseurl: ""
repository: ""

# Plugins necesarios
plugins:
  - jekyll-include-cache

# Apariencia
minimal_mistakes_skin: default # options: default, dark, dirt, neon, etc.
enable_copy_code_button: true

# Motor de Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
markdown_ext: "md,markdown"

# Compilación de SASS/SCSS
sass:
  sass_dir: assets/css
  style: compressed

# Exclude internal tooling from the generated site
exclude:
  - _diagrams/
  - _scripts/
  - typst-packages/
  - vendor/
  - .bundle/
  - Gemfile
  - Gemfile.lock
  - Makefile

# Colecciones
collections:
  test:
    output: true

# Valores por defecto para documentos de colecciones
defaults:
  - scope:
      path: "laboratorios/iissi1"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: labs-iissi-1
      toc: true
      toc_sticky: true
      toc_label: "Contenido"
      toc_icon: "list-ul"
  - scope:
      path: "mc2mr"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: mc2mr
  - scope:
      path: "req2sql"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: req2sql
      toc: true
      footer_scripts:
        - /assets/js/sql-embed.js
  - scope:
      path: "laboratorios/iissi2"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: labs-iissi-2
      toc: true
      toc_sticky: true
      toc_label: "Contenido"
      toc_icon: "list-ul"

# Navegación superior (se gestiona mejor vía _data/navigation.yml)
# Nota: no incluimos directorios con guion bajo aquí para evitar copiar ficheros sin procesar

