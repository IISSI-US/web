title: IISSI (2026/27)
description: Sitio de documentación con colecciones de Jekyll
locale: "es-ES"
logo: "/assets/images/iissi-icon.svg"

# Usa Minimal Mistakes como remote theme (recomendado para GitHub Pages)
remote_theme: "mmistakes/minimal-mistakes@4.27.3"

# Configuración GitHub Pages / despliegue
url: ""
baseurl: ""
repository: ""

# Plugins necesarios
plugins:
  - jekyll-include-cache

# Apariencia
minimal_mistakes_skin: default # options: default, dark, dirt, neon, etc.
enable_copy_code_button: true

# Motor de Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
markdown_ext: "md,markdown"

# Compilación de SASS/SCSS
# sass_dir: Apunta a _sass/ (no assets/css) para que Jekyll encuentre los partials custom
# style: expanded para desarrollo (más legible), cambiar a compressed para producción
sass:
  sass_dir: _sass
  style: expanded

# Exclude internal tooling from the generated site
exclude:
  - _diagrams/
  - _scripts/
  - typst-packages/
  - vendor/
  - .bundle/
  - Gemfile
  - Gemfile.lock
  - Makefile

# Include directories that would normally be excluded
include:
  - assets/DB-Silence-IISSI-1

# Valores por defecto para documentos de colecciones
defaults:
  # Global defaults - hide footer on all pages
  - scope:
      path: ""
    values:
      page_footer: false
  - scope:
      path: "laboratorios/iissi1"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: labs-iissi-1
  - scope:
      path: "mc2mr"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: mc2mr
  - scope:
      path: "req2sql"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: req2sql
      footer_scripts:
        - /assets/js/sql-embed.js
  - scope:
      path: "laboratorios/iissi2"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: labs-iissi-2

# Navegación superior (se gestiona mejor vía _data/navigation.yml)
# Nota: no incluimos directorios con guion bajo aquí para evitar copiar ficheros sin procesar

