title: IISSI (2026/27)
description: Sitio de documentación con colecciones de Jekyll

# Usa Minimal Mistakes como remote theme (recomendado para GitHub Pages)
remote_theme: "mmistakes/minimal-mistakes@4.27.3"

# Configuración GitHub Pages / despliegue
url: ""
baseurl: ""
repository: ""

# Plugins necesarios
plugins:
  - jekyll-include-cache

# Apariencia
minimal_mistakes_skin: default # options: default, dark, dirt, neon, etc.

# Compilación de SASS/SCSS
sass:
  sass_dir: assets/css
  style: compressed

# Colecciones
collections:
  requisitos:
    output: true
    permalink: /requisitos/:path/
  conceptual:
    output: true
    permalink: /modelado-conceptual/:path/
  relacional:
    output: true
    permalink: /modelado-relacional/:path/
  sql:
    output: true
    permalink: /sql/:path/

# Valores por defecto para documentos de colecciones
defaults:
  - scope:
      path: ""
      type: requisitos
    values:
      layout: single
      author_profile: false
      share: false
  - scope:
      path: ""
      type: conceptual
    values:
      layout: single
      author_profile: false
      share: false
  - scope:
      path: ""
      type: relacional
    values:
      layout: single
      author_profile: false
      share: false
  - scope:
      path: ""
      type: sql
    values:
      layout: single
      author_profile: false
      share: false

# Navegación superior (se gestiona mejor vía _data/navigation.yml)
include: ["_pages"]

