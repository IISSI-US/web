title: IISSI (2026/27)
description: Sitio de documentación con colecciones de Jekyll

# Usa Minimal Mistakes como remote theme (recomendado para GitHub Pages)
remote_theme: "mmistakes/minimal-mistakes@4.27.3"

# Configuración GitHub Pages / despliegue
url: ""
baseurl: ""
repository: ""

# Plugins necesarios
plugins:
  - jekyll-include-cache

# Apariencia
minimal_mistakes_skin: default # options: default, dark, dirt, neon, etc.

# Motor de Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
markdown_ext: "md,markdown"

# Compilación de SASS/SCSS
sass:
  sass_dir: assets/css
  style: compressed

# Colecciones
collections:
  conceptual:
    output: true
    permalink: /modelado-conceptual/:path/
  relacional:
    output: true
    permalink: /modelado-relacional/:path/
  sql:
    output: true
    permalink: /sql/:path/

  test:
    output: true

# Valores por defecto para documentos de colecciones
defaults:
  - scope:
      path: "laboratorios"
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: laboratorios
  - scope:
      path: ""
      type: conceptual
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: conceptual
  - scope:
      path: ""
      type: relacional
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: relacional
  - scope:
      path: ""
      type: sql
    values:
      layout: single
      author_profile: false
      share: false
      sidebar:
        nav: sql

# Navegación superior (se gestiona mejor vía _data/navigation.yml)
# Nota: no incluimos directorios con guion bajo aquí para evitar copiar ficheros sin procesar

